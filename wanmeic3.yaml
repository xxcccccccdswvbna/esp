  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32C3_DEFAULT_CPU_FREQ_MHZ: "80"
      CONFIG_BT_NIMBLE_TASK_STACK_SIZE: "4096"
      CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"

logger:
  level: WARN
  logs:
    esp32_ble_server: WARN
    esp32_ble_tracker: WARN
    wifi: WARN

