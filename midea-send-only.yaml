esp32_ble:

esp32_ble_server:
  id: ble_server
  manufacturer_data: []

# =====================
# 全局变量
# =====================
globals:
  - id: is_sending
    type: bool
    initial_value: 'false'

# =====================
# 清空广播（稳定核心）
# =====================
script:
  - id: clear_broadcast
    mode: queued
    then:
      - delay: 80ms
      - lambda: |-
          id(ble_server).set_manufacturer_data({});
      - delay: 120ms
      - lambda: |-
          id(ble_server).set_manufacturer_data({});
      - delay: 120ms
      - globals.set:
          id: is_sending
          value: 'false'

# =====================
# 灯控制
# =====================
switch:
  - platform: template
    name: "灯开关"
    id: light_switch
    optimistic: true

    turn_on_action:
      - lambda: |-
          std::vector<uint8_t> pkt1 = {
            0x11,0x4D,0x19,0x15,0x48,0x80,0x27,0x70,0x00,0x00,
            0x01,0xA6,0xF0,0x86,0x80,0x97,0x27,0x27,
            0x70,0x00,0x5F,0xC8,0x6F,0xB8,0x40
          };
          id(ble_server).set_manufacturer_data(pkt1);

      - delay: 120ms

      - lambda: |-
          std::vector<uint8_t> pkt2 = {
            0x11,0x4D,0x19,0x1C,0x48,0x80,0x27,0x70,0x00,0x00,
            0x01,0x71,0x70,0x00,0x5F,0xC8,0x6F,0xB8,
            0x48,0x48,0xA7,0xF0,0x80,0x80,0x97,0x25
          };
          id(ble_server).set_manufacturer_data(pkt2);

      - script.execute: clear_broadcast

    turn_off_action:
      - script.execute: light_switch.turn_on


# =====================
# 风扇开关
# =====================
  - platform: template
    name: "风扇开关"
    id: fan_switch
    optimistic: true

    turn_on_action:
      - lambda: |-
          std::vector<uint8_t> pkt1 = {
            0x11,0x4D,0x19,0x15,0x48,0x80,0x27,0x70,0x00,0x00,
            0x01,0xA6,0xF0,0x89,0x80,0x97,0x27,0x27,
            0x70,0x00,0x5F,0xC8,0x6F,0xB8,0x43
          };
          id(ble_server).set_manufacturer_data(pkt1);

      - delay: 120ms

      - lambda: |-
          std::vector<uint8_t> pkt2 = {
            0x11,0x4D,0x19,0x1F,0x48,0x80,0x27,0x70,0x00,0x00,
            0x01,0x5E,0xC8,0x6F,0xB8,0x48,0x48,
            0xA7,0xF0,0x80,0x80,0x97,0x27,0x27,0x70,0x72
          };
          id(ble_server).set_manufacturer_data(pkt2);

      - script.execute: clear_broadcast

    turn_off_action:
      - script.execute: fan_switch.turn_on


# =====================
# 风扇档位（滑条）
# =====================
number:
  - platform: template
    name: "风扇档位"
    id: fan_level
    min_value: 0
    max_value: 6
    step: 1
    optimistic: true

    set_action:
      - lambda: |-
          int lv = (int)x;

      - if:
          condition:
            lambda: 'return x == 1;'
          then:
            - lambda: |-
                std::vector<uint8_t> pkt = {
                  0x11,0x4D,0x19,0x1B,0x48,0x80,0x27,0x70,0x00,0x00,
                  0x01,0x26,0x70,0x69,0x00,0x5F,0xC8,0x6F,0xB8,
                  0x48,0x48,0xA7,0xF0,0x80,0x80,0x8C
                };
                id(ble_server).set_manufacturer_data(pkt);
            - script.execute: clear_broadcast

      - if:
          condition:
            lambda: 'return x == 2;'
          then:
            - lambda: |-
                std::vector<uint8_t> pkt = {
                  0x11,0x4D,0x19,0x1B,0x48,0x80,0x27,0x70,0x00,0x00,
                  0x01,0x26,0x70,0x6A,0x00,0x5F,0xC8,0x6F,0xB8,
                  0x48,0x48,0xA7,0xF0,0x80,0x80,0x8B
                };
                id(ble_server).set_manufacturer_data(pkt);
            - script.execute: clear_broadcast

      - if:
          condition:
            lambda: 'return x == 3;'
          then:
            - lambda: |-
                std::vector<uint8_t> pkt = {
                  0x11,0x4D,0x19,0x1A,0x48,0x80,0x27,0x70,0x00,0x00,
                  0x01,0x26,0x27,0xF1,0x70,0x00,0x5F,0xC8,
                  0x6F,0xB8,0x48,0x48,0xA7,0xF0,0x80,0x03
                };
                id(ble_server).set_manufacturer_data(pkt);
            - script.execute: clear_broadcast

      # ===== 4~6档（你可继续扩展） =====
      - if:
          condition:
            lambda: 'return x == 4;'
          then:
            - script.execute: fan_4

      - if:
          condition:
            lambda: 'return x == 5;'
          then:
            - script.execute: fan_5

      - if:
          condition:
            lambda: 'return x == 6;'
          then:
            - script.execute: fan_6


# =====================
# 风扇反转
# =====================
button:
  - platform: template
    name: "风扇反转"
    on_press:
      - lambda: |-
          std::vector<uint8_t> pkt = {
            0x11,0x4D,0x19,0x15,0x48,0x80,0x27,0x70,0x00,0x00,
            0x01,0xA6,0xF0,0x9C,0x80,0x97,0x27,0x27,
            0x70,0x00,0x5F,0xC8,0x6F,0xB8,0x56
          };
          id(ble_server).set_manufacturer_data(pkt);

      - script.execute: clear_broadcast
