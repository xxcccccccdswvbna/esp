# ========== 亮度 & 色温滑块控制 ==========
number:
  - platform: template
    name: "Midea Light Brightness"
    id: ctrl_brightness
    min_value: 0
    max_value: 100
    step: 25  # 只设 0/25/50/75/100 五档
    mode: slider
    optimistic: true
    set_action:
      - lambda: |-
          if (id(is_sending)) return;
          id(is_sending) = true;
          
          // 预置 5 档亮度包 (需替换为你抓到的实际包)
          std::vector<std::vector<uint8_t>> brt_pkts = {
            {0x11,0x4D,0x19,0x15,0x48,0x80,0x27,0x70,0x00,0x00,0x01,0xA6,0xF0,0x86,0x80,0x97,0x27,0x27,0x70,0x70,0x00,0x5F,0xC8,0x6F,0xB8,0x40}, // 0%  ← 替换
            {0x11,0x4D,0x19,0x15,0x48,0x80,0x27,0x70,0x00,0x00,0x01,0xA6,0xF0,0x86,0x80,0x97,0x27,0x27,0x70,0x70,0x00,0x5F,0xC8,0x6F,0xB8,0x40}, // 25% ← 替换
            {0x11,0x4D,0x19,0x15,0x48,0x80,0x27,0x70,0x00,0x00,0x01,0xA6,0xF0,0x86,0x80,0x97,0x27,0x27,0x70,0x70,0x00,0x5F,0xC8,0x6F,0xB8,0x40}, // 50% ← 替换
            {0x11,0x4D,0x19,0x15,0x48,0x80,0x27,0x70,0x00,0x00,0x01,0xA6,0xF0,0x86,0x80,0x97,0x27,0x27,0x70,0x70,0x00,0x5F,0xC8,0x6F,0xB8,0x40}, // 75% ← 替换
            {0x11,0x4D,0x19,0x15,0x48,0x80,0x27,0x70,0x00,0x00,0x01,0xA6,0xF0,0x86,0x80,0x97,0x27,0x27,0x70,0x70,0x00,0x5F,0xC8,0x6F,0xB8,0x40}  // 100%← 替换
          };
          
          int idx = (int)(x / 25);  // 0-4
          auto pkt = brt_pkts[idx];
          auto end = std::vector<uint8_t>{0x11,0x4D,0x19,0x1C,0x48,0x80,0x27,0x70,0x00,0x00,0x01,0x71,0x70,0x00,0x5F,0xC8,0x6F,0xB8,0x48,0x48,0xA7,0xF0,0x80,0x80,0x97,0x25};
          
          id(ble_server).set_manufacturer_data(pkt);
          delay(200);
          id(ble_server).set_manufacturer_data(end);
          delay(200);
          id(ble_server).set_manufacturer_data({});
          id(is_sending) = false;

