esphome:
  name: midea-send-only
  friendly_name: Midea Send Only

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: "4jGVSQw9/v+e8QCB/CSQIwGFcWS3Opo4oHSRbkq41RI="

ota:
  - platform: esphome
    password: "chen1122"

wifi:
  ssid: "CC"
  password: "chen1122"

  manual_ip:
    static_ip: 192.168.6.72
    gateway: 192.168.6.1
    subnet: 255.255.255.0

  power_save_mode: NONE

captive_portal:

esp32_ble_beacon:
  type: iBeacon
  uuid: "00000000-0000-0000-0000-000000000000"

globals:
  - id: sending
    type: bool
    restore_value: no
    initial_value: 'false'

button:

  - platform: template
    name: "Midea Light Toggle"
    id: midea_light_toggle

    on_press:
      - if:
          condition:
            lambda: 'return id(sending);'
          then:
            - logger.log: "BLE busy"
          else:
            - globals.set:
                id: sending
                value: 'true'

            - lambda: |-
                ESP_LOGI("BLE", "发送灯控制广播");

            # 第一包
            - esp32_ble_beacon.start:
                manufacturer_id: 19729
                major: 0x191C
                minor: 0x4880

            - delay: 300ms

            # 第二包
            - esp32_ble_beacon.start:
                manufacturer_id: 19729
                major: 0x191A
                minor: 0x4880

            - delay: 1000ms

            - esp32_ble_beacon.stop

            - globals.set:
                id: sending
                value: 'false'
