# ========== Dev3 状态监听 (修复版：含调试日志+防未知) ==========
esp32_ble_tracker:
  scan_parameters:
    interval: 300ms  # 加快扫描，确保不漏包
    window: 200ms
    active: false
  on_ble_advertise:  # 改用全局广播监听，绕过 manufacturer_id 预过滤
    then:
      - lambda: |-
          // 1. 基础过滤：必须是厂商数据且长度够
          if (!x.get_manufacturer_data().empty() && x.get_manufacturer_data().size() >= 20) {
            const auto& mfr = x.get_manufacturer_data();
            // mfr[0~1] 是 Company ID，mfr[2] 开始是负载
            if (mfr[0] == 0x4D && mfr[1] == 0x13 && mfr[2] == 0x21) {
              ESP_LOGI("Dev3_Debug", "✅ 捕获到设备广播! Size=%d", mfr.size());
              
              // 暂时注释 MAC 过滤，先跑通逻辑。确认正常后可取消注释
              // if (mfr[4]!=0x48 || mfr[5]!=0x80 || mfr[6]!=0x27 || mfr[7]!=0x70) return;
              
              bool power_on = (mfr[11] == 0x01);
              bool fan_running = (mfr[20] & 0x01);
              uint8_t fan_gear_idx = mfr[21];
              uint16_t brt_raw = (mfr[16] << 8) | mfr[17];
              int brt_pct = (brt_raw == 0xFFFF) ? 100 : (int)(brt_raw / 655.35);
              
              id(dev3_power).publish_state(power_on);
              id(dev3_fan_running).publish_state(fan_running);
              id(dev3_fan_speed).publish_state(fan_running ? (fan_gear_idx + 1) : 0);
              id(dev3_brightness).publish_state(brt_pct);
              
              ESP_LOGI("Dev3_State", "Power=%d Fan=%d(Idx%d) BRT=%d%%", 
                       power_on, fan_running, fan_gear_idx, brt_pct);
              return; // 匹配成功，结束
            }
          }

