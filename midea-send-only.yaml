esphome:
  name: midea-dual-control
  friendly_name: Midea Dual Control
  # ✅ on_boot 必须写在 esphome: 内部
  on_boot:
    - priority: 600  # 在 WiFi 连接后执行
      then:
        # 初始化 binary_sensor 为 OFF
        - binary_sensor.template.publish:
            id: dev3_power
            state: 'OFF'
        - binary_sensor.template.publish:
            id: dev3_fan_running
            state: 'OFF'
        # 初始化 sensor 为 0
        - sensor.template.publish:
            id: dev3_fan_speed
            state: 0
        - sensor.template.publish:
            id: dev3_brightness
            state: 0
esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

# 1️⃣ 优化内置超时（替换原有 wifi/api 配置）
wifi:
  ssid: "CC"
  password: "chen1122"
  power_save_mode: none
  reboot_timeout: 0s  # 关闭内置WiFi超时，改用自定义看门狗（更稳定）

api:
  encryption:
    key: "4jGVSQw9/v+e8QCB/CSQIwGFcWS3Opo4oHSRbkq41RI="
  reboot_timeout: 10min  # HA断连10分钟自动重启

# 2️⃣ 降日志级别（大幅降低内存占用，防BLE堆栈溢出）
logger:
  level: WARN  # ⚠️ 生产环境务必改为 WARN 或 ERROR，DEBUG 极易导致 C3 死机
  logs:
    esp32_ble_server: ERROR
    esp32_ble_tracker: ERROR
    wifi: WARN
    api: WARN

# 3️⃣ 网络看门狗（每60秒检查，连续3次断网才重启，防路由抖动）
interval:
  - interval: 60s
    then:
      - lambda: |-
          static int fail_count = 0;
          if (!WiFi.isConnected()) {
            fail_count++;
            ESP_LOGW("Watchdog", "WiFi断连 (%d/3)", fail_count);
            if (fail_count >= 3) {
              ESP_LOGW("Watchdog", "连续断网，执行安全重启");
              delay(1000);  // 留给日志输出时间
              ESP.restart();  // ESP-IDF 原生安全重启
            }
          } else {
            fail_count = 0;  // 网络恢复则清零计数
          }

esp32_ble:
  io_capability: none

esp32_ble_server:
  id: ble_server
  manufacturer_data: []

# ========== 全局变量 (非阻塞架构核心) ==========
globals:
  - id: last_cmd_time
    type: uint32_t
    initial_value: '0'
  - id: cmd_pkt
    type: std::vector<uint8_t>
    initial_value: 'std::vector<uint8_t>{}'
  - id: end_pkt
    type: std::vector<uint8_t>
    initial_value: 'std::vector<uint8_t>{}'

