esphome:
  name: midea-fan-light-complete
  friendly_name: Midea Fan Light Complete

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

logger:
  level: INFO
  logs:
    esp32_ble_server: WARN

api:
  encryption:
    key: "4jGVSQw9/v+e8QCB/CSQIwGFcWS3Opo4oHSRbkq41RI="
  reboot_timeout: 1h

ota:
  platform: esphome
  password: "chen1122"

wifi:
  ssid: "CC"
  password: "chen1122"
  power_save_mode: none

esp32_ble:
  io_capability: none

esp32_ble_server:
  id: ble_server
  manufacturer_data: []

# ========== 全局互斥锁 ==========
globals:
  - id: is_sending
    type: bool
    initial_value: 'false'

# ========== 按钮控制 ==========
button:
  # 💡 灯光开关
  - platform: template
    name: "Midea Light Toggle"
    icon: mdi:lightbulb
    on_press:
      - if:
          condition:
            lambda: 'return !id(is_sending);'
          then:
            - globals.set: {id: is_sending, value: 'true'}
            - lambda: |-
                id(ble_server).set_manufacturer_data({0x11,0x4D,0x19,0x15,0x48,0x80,0x27,0x70,0x00,0x00,0x01,0xA6,0xF0,0x86,0x80,0x97,0x27,0x27,0x70,0x70,0x00,0x5F,0xC8,0x6F,0xB8,0x40});
            - delay: 200ms
            - lambda: |-
                id(ble_server).set_manufacturer_data({0x11,0x4D,0x19,0x1C,0x48,0x80,0x27,0x70,0x00,0x00,0x01,0x71,0x70,0x00,0x5F,0xC8,0x6F,0xB8,0x48,0x48,0xA7,0xF0,0x80,0x80,0x97,0x25});
            - delay: 200ms
            - lambda: 'id(ble_server).set_manufacturer_data({});'
            - globals.set: {id: is_sending, value: 'false'}
          else:
            - logger.log: "⏳ 指令发送中，请稍后"

