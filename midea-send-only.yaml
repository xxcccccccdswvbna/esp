esphome:
  name: midea-send-only
  friendly_name: Midea Send Only

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: "4jGVSQw9/v+e8QCB/CSQIwGFcWS3Opo4oHSRbkq41RI="

ota:
  - platform: esphome
    password: "chen1122"

wifi:
  ssid: "CC"
  password: "chen1122"

captive_portal:

esp32_ble:

esp32_ble_server:
  id: ble_server
  manufacturer_data: []

globals:
  - id: is_sending
    type: bool
    restore_value: no
    initial_value: 'false'

script:
  - id: clear_broadcast
    then:
      - delay: 300ms
      - lambda: |-
          std::vector<uint8_t> empty = {};
          id(ble_server).set_manufacturer_data(empty);
      - globals.set:
          id: is_sending
          value: 'false'

button:

  - platform: template
    name: "Midea Light Toggle"
    id: light_toggle
    on_press:
      - if:
          condition:
            lambda: 'return id(is_sending);'
          then:
            - logger.log: "BLE busy"
          else:
            - globals.set:
                id: is_sending
                value: 'true'

            - lambda: |-
                std::vector<uint8_t> mfr_data = {
                  0x19,0x1C,0x48,0x80,0x27,0x70,0x00,0x00,
                  0x01,0x71,0x70,0x06,0x5F,0xC8,0x6F,0xB8,
                  0x48,0x48,0xA7,0xF0,0x80,0x80,0x97,0x2F
                };
                id(ble_server).set_manufacturer_data(mfr_data);

            - delay: 200ms

            - lambda: |-
                std::vector<uint8_t> mfr_data = {
                  0x19,0x1A,0x48,0x80,0x27,0x70,0x00,0x00,
                  0x01,0x26,0x27,0x70,0x70,0x00,0x5F,0xC8,
                  0x6F,0xB8,0x48,0x48,0xA7,0xF0,0x80,0x82
                };
                id(ble_server).set_manufacturer_data(mfr_data);

            - script.execute: clear_broadcast



  - platform: template
    name: "Midea Fan Toggle"
    id: fan_toggle
    on_press:

      - lambda: |-
          std::vector<uint8_t> mfr_data = {
            0x19,0x16,0x48,0x80,0x27,0x70,0x00,0x00,
            0x01,0xF1,0x80,0x89,0x97,0x27,0x27,0x70,
            0x70,0x00,0x5F,0xC8,0x6F,0xB8,0x48,0x43
          };
          id(ble_server).set_manufacturer_data(mfr_data);

      - delay: 200ms

      - lambda: |-
          std::vector<uint8_t> mfr_data = {
            0x19,0x1F,0x48,0x80,0x27,0x70,0x00,0x00,
            0x01,0x5E,0xC8,0x6F,0xB8,0x48,0x48,0xA7,
            0xF0,0x80,0x80,0x97,0x27,0x27,0x70,0x72
          };
          id(ble_server).set_manufacturer_data(mfr_data);

      - script.execute: clear_broadcast
