  framework:
    type: esp-idf

logger:
  level: INFO
  logs:
    esp32_ble_server: WARN

api:
  encryption:
    key: "4jGVSQw9/v+e8QCB/CSQIwGFcWS3Opo4oHSRbkq41RI="
  reboot_timeout: 1h

ota:
  platform: esphome
  password: "chen1122"

wifi:
  ssid: "CC"
  password: "chen1122"
  power_save_mode: none

esp32_ble:
  io_capability: none

esp32_ble_server:
  id: ble_server
  manufacturer_data: []

# ========== 全局变量（仅控制用）==========
globals:
  - id: is_sending
    type: bool
    initial_value: 'false'
  - id: cmd_data
    type: std::vector<uint8_t>
    initial_value: 'std::vector<uint8_t>{}'
  - id: end_data
    type: std::vector<uint8_t>
    initial_value: 'std::vector<uint8_t>{}'

# ========== 双包发送脚本 ==========
script:
  - id: send_dual_packet
    then:
      - if:
          condition:
            lambda: 'return !id(is_sending);'
          then:
            - globals.set: {id: is_sending, value: 'true'}
            - lambda: |-
                id(ble_server).set_manufacturer_data(id(cmd_data));
            - delay: 200ms
            - lambda: |-
                id(ble_server).set_manufacturer_data(id(end_data));
            - delay: 200ms
            - lambda: |-
                id(ble_server).set_manufacturer_data({});
            - globals.set: {id: is_sending, value: 'false'}

