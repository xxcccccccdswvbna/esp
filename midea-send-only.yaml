esphome:
  name: midea-send-only
  friendly_name: Midea Send Only

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

logger:
  level: DEBUG

api:
  encryption:
    key: "4jGVSQw9/v+e8QCB/CSQIwGFcWS3Opo4oHSRbkq41RI="
  reboot_timeout: 1h

ota:
  platform: esphome
  password: "chen1122"

wifi:
  ssid: "CC"
  password: "chen1122"

esp32_ble:
  io_capability: none

esp32_ble_server:
  id: ble_server
  # 不设置 manufacturer_id，也不设置初始数据
  manufacturer_data: []

button:
  - platform: template
    name: "Midea Light Toggle"
    icon: mdi:lightbulb
    on_press:
      # --- 第一步：发送第一组数据 (包含 Company ID) ---
      - lambda: |-
          // 尝试在数据前加上 Company ID: 0x4D11 -> 小端序: 0x11, 0x4D
          // 原始 Payload: 0x191C...
          // 组合后: 0x11, 0x4D, 0x19, 0x1C...
          std::vector<uint8_t> pkt1 = {
            0x11, 0x4D, // Company ID: 0x4D11 (Little Endian)
            0x19, 0x1C, 0x48, 0x80, 0x27, 0x70, 0x00, 0x00, 
            0x01, 0x71, 0x70, 0x06, 0x5F, 0xC8, 0x6F, 0xB8, 
            0x48, 0x48, 0xA7, 0xF0, 0x80, 0x80, 0x97, 0x2F
          };
          id(ble_server).set_manufacturer_data(pkt1);
          ESP_LOGD("BLE", ">>> Sent Packet 1 (with CID)");

      - delay: 120ms

      # --- 第二步：发送第二组数据 (包含 Company ID) ---
      - lambda: |-
          std::vector<uint8_t> pkt2 = {
            0x11, 0x4D, // Company ID: 0x4D11 (Little Endian)
            0x19, 0x1A, 0x48, 0x80, 0x27, 0x70, 0x00, 0x00, 
            0x01, 0x26, 0x27, 0x70, 0x70, 0x00, 0x5F, 0xC8, 
            0x6F, 0xB8, 0x48, 0x48, 0xA7, 0xF0, 0x80, 0x82
          };
          id(ble_server).set_manufacturer_data(pkt2);
          ESP_LOGD("BLE", ">>> Sent Packet 2 (with CID)");

      - delay: 120ms

      # --- 第三步：清空 ---
      - lambda: |-
          std::vector<uint8_t> empty = {};
          id(ble_server).set_manufacturer_data(empty);
          ESP_LOGD("BLE", ">>> Broadcast Cleared");
