# ========== 亮度 & 色温滑块控制 ==========
number:
  - platform: template
    name: "Midea Light Color Temp"
    id: ctrl_colortemp
    min_value: 2700
    max_value: 6500
    step: 950
    mode: slider
    optimistic: true
    unit_of_measurement: "K"
    icon: mdi:thermometer
    set_action:
      - lambda: |-
          if (id(is_sending)) return;
          id(is_sending) = true;
          
          // 计算档位索引 (2700K→0, 3650K→1, 4600K→2, 5550K→3, 6500K→4)
          int idx = round((x - 2700.0) / 950.0);
          if (idx < 0) idx = 0;
          if (idx > 4) idx = 4;
          
          std::vector<uint8_t> pkt, end;
          switch(idx) {
            case 0: // 2700K (暖光)
              pkt = {0x11,0x4D,0x19,0x1B,0x48,0x80,0x27,0x70,0x00,0x00,0x01,0x26,0x71,0x25,0x00,0x5F,0xC8,0x6F,0xB8,0x48,0x48,0xA7,0xF0,0x80,0x80,0xCF};
