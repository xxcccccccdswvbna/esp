# BLE Server：发送控制指令
esp32_ble_server:
  id: ble_server
  manufacturer_data: []

# ========== 全局变量 ==========
globals:
  - id: is_sending
    type: bool
    initial_value: 'false'
  - id: last_state_hash
    type: uint32_t
    initial_value: '0'

# ========== BLE 状态监听 (核心) ==========
esp32_ble_tracker:
  scan_parameters:
    interval: 800ms
    window: 400ms
    active: false
  on_ble_manufacturer_data_advertise:
    - manufacturer_id: "06A8"  # 美的广播常见 ID
      then:
        - lambda: |-
            // ===== 1. 基础校验 =====
            if (x.size() < 20) return;
            
            // ===== 2. MAC 地址过滤 (目标: 00:00:70:49:A8:7D) =====
            // 广播中 MAC 是反向存储: 7D A8 49 70 00 00
            if (x[6] != 0x7D || x[7] != 0xA8 || x[8] != 0x49 || 
                x[9] != 0x70 || x[10] != 0x00 || x[11] != 0x00) {
              return;
            }
            
            // ===== 3. 协议头校验 (11 4D 19 = 美的风扇灯状态包) =====
            if (x[0] != 0x11 || x[1] != 0x4D || x[2] != 0x19) return;
            
            // ===== 4. 跳过自己发送的指令包 (避免回环) =====
            if (id(is_sending)) return;
            
            // ===== 5. 解析字段 =====
            uint8_t cmd_type = x[3];      // 0x14/15/17/18/1A/1B/1C/1E/1F
            uint8_t mode_high = x[11];    // 模式高位
            uint8_t mode_low = x[12];     // 模式低位 (含亮度/色温信息)
            uint8_t brightness_raw = x[12];  // 亮度 0-255
            uint8_t color_raw = x[13];       // 色温 0-255
            uint16_t timer_min = (x[14] << 8) | x[15];  // 定时分钟
            uint8_t fan_byte = x[16];     // 风扇相关字节
            
            // ===== 6. 计算状态 =====
            // LED 开关: mode_low 的最低位
            bool led_on = (mode_low & 0x01);
            
            // 风扇状态: 根据 cmd_type 判断
            int fan_state = 0;  // 0=关, 1=开
            int fan_gear = 0;   // 0-6 档
            int fan_dir = 0;    // 0=正转, 1=反转
            
            // 根据命令类型推断风扇状态 (需根据你的抓包微调)
            if (cmd_type == 0x15 || cmd_type == 0x1F) {
              fan_state = 1;  // 风扇相关指令
              // 简单推断: 如果 fan_byte 高位有特征
              if (fan_byte & 0x80) fan_dir = 1;  // 反转标志
            }
            
            // 亮度/色温百分比
            int brightness_pct = (int)((float)brightness_raw / 255.0 * 100.0 + 0.5);
            int color_pct = (int)((float)color_raw / 255.0 * 100.0 + 0.5);
            int color_kelvin = 2700 + (int)((6500 - 2700) * color_pct / 100.0 + 0.5);
            
            // ===== 7. 去重更新 (简单哈希) =====
            uint32_t hash = (led_on << 24) | (brightness_pct << 16) | (color_kelvin >> 4);
            if (hash == id(last_state_hash)) return;
            id(last_state_hash) = hash;
            
            // ===== 8. 发布到 HA =====
            id(sw_light_state).publish_state(led_on);
            id(s_brightness).publish_state(brightness_pct);
            id(s_colortemp).publish_state(color_kelvin);
            id(s_fan_state).publish_state(fan_state > 0);
            id(s_fan_gear).publish_state(fan_gear);
            id(s_timer).publish_state(timer_min);
            
            ESP_LOGD("MideaState", "LED=%d BRT=%d%% CT=%dK FAN=%d", 
                     led_on, brightness_pct, color_kelvin, fan_state);

# ========== 控制脚本 (复用你验证成功的) ==========
script:
  - id: send_dual_packet
    then:
      - if:
          condition:
            lambda: 'return !id(is_sending);'
          then:
            - globals.set: {id: is_sending, value: 'true'}
            - lambda: |-
                auto cmd = id(cmd_data).template std::vector<uint8_t>();
                auto end = id(end_data).template std::vector<uint8_t>();
                id(ble_server).set_manufacturer_data(cmd);
            - delay: 200ms
            - lambda: |-
                id(ble_server).set_manufacturer_data(id(end_data).template std::vector<uint8_t>());
            - delay: 200ms
            - lambda: |-
                id(ble_server).set_manufacturer_data({});
            - globals.set: {id: is_sending, value: 'false'}

# ========== 全局数据包变量 ==========
globals:
  - id: cmd_data
    type: std::vector<uint8_t>
    initial_value: 'std::vector<uint8_t>{}'
  - id: end_data
    type: std::vector<uint8_t>
    initial_value: 'std::vector<uint8_t>{}'

