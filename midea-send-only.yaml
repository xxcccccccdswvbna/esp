esphome:
  name: midea-send-only
  friendly_name: Midea Send Only

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

logger:
  level: DEBUG

api:
  encryption:
    key: "4jGVSQw9/v+e8QCB/CSQIwGFcWS3Opo4oHSRbkq41RI="
  reboot_timeout: 1h

ota:
  platform: esphome
  password: "chen1122"

wifi:
  ssid: "CC"
  password: "chen1122"

esp32_ble:
  io_capability: none

esp32_ble_server:
  id: ble_server
  # 【关键修改 1】显式指定美的的 Company ID (0x4D11)
  # 注意：这里填的是十进制或十六进制，ESPHome 会自动处理大小端
  manufacturer_id: 0x4D11
  # 初始为空
  manufacturer_data: []

button:
  - platform: template
    name: "Midea Light Toggle"
    icon: mdi:lightbulb
    on_press:
      # --- 第一步：发送第一组数据 ---
      - lambda: |-
          // 【关键修改 2】发送完整的 Payload，包含 0x19, 0x1C
          // 因为 manufacturer_id 已经由上面指定了，这里只放 Payload
          std::vector<uint8_t> pkt1 = {
            0x19, 0x1C, 0x48, 0x80, 0x27, 0x70, 0x00, 0x00, 
            0x01, 0x71, 0x70, 0x06, 0x5F, 0xC8, 0x6F, 0xB8, 
            0x48, 0x48, 0xA7, 0xF0, 0x80, 0x80, 0x97, 0x2F
          };
          id(ble_server).set_manufacturer_data(pkt1);
          ESP_LOGD("BLE", ">>> Sent Packet 1 (ON) with ID 0x4D11");

      - delay: 120ms

      # --- 第二步：发送第二组数据 ---
      - lambda: |-
          std::vector<uint8_t> pkt2 = {
            0x19, 0x1A, 0x48, 0x80, 0x27, 0x70, 0x00, 0x00, 
            0x01, 0x26, 0x27, 0x70, 0x70, 0x00, 0x5F, 0xC8, 
            0x6F, 0xB8, 0x48, 0x48, 0xA7, 0xF0, 0x80, 0x82
          };
          id(ble_server).set_manufacturer_data(pkt2);
          ESP_LOGD("BLE", ">>> Sent Packet 2 (OFF) with ID 0x4D11");

      - delay: 120ms

      # --- 第三步：清空 ---
      - lambda: |-
          std::vector<uint8_t> empty = {};
          id(ble_server).set_manufacturer_data(empty);
          ESP_LOGD("BLE", ">>> Broadcast Cleared");
