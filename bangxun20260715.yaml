esphome:
  name: ee
  friendly_name: 邦训小萌1s
  on_boot:
    priority: -100
    then:
      - script.execute: update_relay_led

esp8266:
  board: esp01_1m
  # 已移除废弃的 restore_from_flash: true

# ================= 核心优化 1：闪存读写保护 =================
preferences:
  flash_write_interval: 10min # 延迟闪存写入。状态改变后在内存中缓存，10分钟后统一写入闪存，极大延长设备寿命

# ================= 核心优化 2：释放 RAM =================
logger:
  level: NONE # 完全关闭日志引擎（仅 baud_rate: 0 仍会占用缓存内存）

api:

ota:
  - platform: esphome
    password: "chen1122"

wifi:
  ssid: "CC"
  password: "chen1122"
  min_auth_mode: WPA2
  reboot_timeout: 0s
  ap:
    ssid: "EE-Setup"
    password: "12345678"

captive_portal:

# 注意：Web Server 在 ESP8266 上占用极大内存（约 10-15KB）。如果不需要网页控制，建议直接注释掉以下两行
web_server:
  port: 80

mqtt:
  broker: bemfa.com
  port: 9501
  username: "97109945d7e24559b3e4ca7a1f8ef160"
  password: "97109945d7e24559b3e4ca7a1f8ef160"
  client_id: "97109945d7e24559b3e4ca7a1f8ef160"
  keepalive: 30s
  discovery: false
  birth_message:
    topic: plug001/up
    payload: "online"
  will_message:
    topic: plug001/up
    payload: "offline"
  on_connect:
    then:
      - mqtt.publish:
          topic: plug001/up
          payload: !lambda 'return id(relay).state ? "on" : "off";' # 优化：合并条件判断
  on_message:
    - topic: plug001
      then:
        - lambda: |-
            if (x == "on" || x == "ON" || x == "1") {
              id(relay).turn_on();
            } else if (x == "off" || x == "OFF" || x == "0") {
              id(relay).turn_off();
            }

# ================= 核心控制区 =================

output:
  - platform: gpio
    id: relay_led_output
    pin:
      number: GPIO12
      inverted: true
      
  - platform: gpio
    id: wifi_led_output
    pin:
      number: GPIO13
      inverted: true 

script:
  - id: update_relay_led
    mode: restart
    then:
      - lambda: |-
          // 直接在 C++ 底层判断并执行，避免 YAML 的 if 动作节点带来的内存开销
          if (id(relay).state && id(relay_led_enable).state) {
            id(relay_led_output).turn_on();
          } else {
            id(relay_led_output).turn_off();
          }


switch:
  - platform: gpio
    id: relay
    name: "插座开关"
    pin: GPIO15
    on_turn_on:
      - script.execute: update_relay_led
      - mqtt.publish:
          topic: plug001/set
          payload: "on"
    on_turn_off:
      - script.execute: update_relay_led
      - mqtt.publish:
          topic: plug001/set
          payload: "off"

  - platform: template
    id: relay_led_enable
    name: "继电器指示灯"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    turn_on_action:
      - script.execute: update_relay_led
    turn_off_action:
      - script.execute: update_relay_led

  - platform: template
    id: wifi_led_switch
    name: "WiFi指示灯"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

# ================= 绿色、静音、安全的控制区 =================

interval:
  - interval: 500ms
    then:
      - lambda: |-
          // 引入静态变量，用来记录上一次的 LED 实际物理状态
          // 0 = 熄灭, 1 = 常亮, 2 = 闪烁
          static int last_physical_state = -1; 
          static bool toggle = false;

          // 1. 如果指示灯功能被关闭
          if (!id(wifi_led_switch).state) {
            if (last_physical_state != 0) {
              id(wifi_led_output).turn_off();
              last_physical_state = 0; // 只在切换瞬间写入一次引脚
            }
          } 
          // 2. 如果已连接 WiFi -> 常亮
          else if (network::is_connected()) {
            if (last_physical_state != 1) {
              id(wifi_led_output).turn_on();
              last_physical_state = 1; // 只在连接成功瞬间写入一次引脚
            }
          } 
          // 3. 未连接 WiFi -> 闪烁 (闪烁本身需要交替状态，允许交替，但局限于未连接时)
          else {
            last_physical_state = 2; // 标记当前在闪烁状态
            toggle = !toggle;
            if (toggle) {
              id(wifi_led_output).turn_on();
            } else {
              id(wifi_led_output).turn_off();
            }
          }

# ================= 核心控制区结束 =================

binary_sensor:
  - platform: gpio
    id: button_input
    internal: true
    pin:
      number: GPIO14
      mode: INPUT_PULLUP
    filters:
      - invert:
      - delayed_on: 20ms # 优化：通常按键防抖 20ms 足矣，无需 off 延时，减少定时器内存消耗
    on_press:
      - switch.toggle: relay

sensor:
  - platform: wifi_signal
    id: wifi_db
    name: WiFi信号_WiFiSignal
    update_interval: 60s

  - platform: template
    id: wifi_quality
    name: WiFi质量_WiFiQuality
    lambda: |-
      float x = id(wifi_db).state;
      if (x <= -100) return 0;
      if (x >= -50) return 100;
      return 2 * (x + 100);
    unit_of_measurement: "%"

  - platform: template
    id: free_heap
    name: 剩余内存_FreeHeap
    lambda: |-
      return ESP.getFreeHeap();
    unit_of_measurement: "B"
    update_interval: 60s

  - platform: uptime
    id: uptime_sensor
    name: "运行时间_Uptime"
    update_interval: 60s

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "设备IP"

button:
  - platform: restart
    name: "重启设备"
