mqtt:
  broker: bemfa.com
  port: 9501
  username: "97109945d7e24559b3e4ca7a1f8ef160"
  password: "97109945d7e24559b3e4ca7a1f8ef160"
  client_id: "97109945d7e24559b3e4ca7a1f8ef160"
  keepalive: 30s
  discovery: false

  birth_message:
    topic: plug001/up
    payload: "online"

  will_message:
    topic: plug001/up
    payload: "offline"

  on_connect:
    then:
      - if:
          condition:
            switch.is_on: relay
          then:
            - mqtt.publish:
                topic: plug001/up
                payload: "on"
      - if:
          condition:
            switch.is_off: relay
          then:
            - mqtt.publish:
                topic: plug001/up
                payload: "off"

  on_message:
    - topic: plug001
      then:
        - lambda: |-
            if (x == "on" || x == "ON" || x == "1") {
              id(relay).turn_on();
            } else if (x == "off" || x == "OFF" || x == "0") {
              id(relay).turn_off();
            }

# ================= 核心控制区 =================

# 1. 全局变量：用来记录“指示灯总开关”的状态
globals:
  - id: relay_led_enable_state
    type: bool
    restore_value: yes
    initial_value: 'true'  # 默认开启

# 2. 底层输出：纯粹控制 GPIO12 引脚（不暴露给 HA，最稳定）
output:
  - platform: gpio
    id: relay_led_output
    pin:
      number: GPIO12
      inverted: true  # 如果你的灯是高电平点亮，请删掉这一行

# 3. 开关实体定义
switch:
  # 指示灯总开关（在 HA 中显示，仅用于切换全局变量）
  - platform: template
    id: relay_led_enable
    name: "继电器指示灯"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    
    # 当你在 HA 中打开总开关时，更新全局变量，并检查插座状态
    on_turn_on:
      - globals.set:
          id: relay_led_enable_state
          value: 'true'
      - if:
          condition:
            switch.is_on: relay
          then:
            - output.turn_on: relay_led_output
            
    # 当你在 HA 中关闭总开关时，更新全局变量，并强制关灯
    on_turn_off:
      - globals.set:
          id: relay_led_enable_state
          value: 'false'
      - output.turn_off: relay_led_output

  # 插座开关
  - platform: gpio
    id: relay
    name: "插座开关"
    pin: GPIO15
    
    # 插座打开时：检查全局变量，如果允许亮灯，则点亮底层 output
    on_turn_on:
      - if:
          condition:
            lambda: 'return id(relay_led_enable_state);'
          then:
            - output.turn_on: relay_led_output
      - mqtt.publish:
          topic: plug001/set
          payload: "on"
          
    # 插座关闭时：无条件熄灭底层 output
    on_turn_off:
      - output.turn_off: relay_led_output
      - mqtt.publish:
          topic: plug001/set
          payload: "off"

  # WiFi状态灯 (保持不变)
  - platform: gpio
    id: wifi_led
    name: "WiFi状态灯"
    pin:
      number: GPIO13
      inverted: true
    restore_mode: RESTORE_DEFAULT_ON

# ================= 核心控制区结束 =================

binary_sensor:
  - platform: gpio
    id: button_input
    internal: true
    pin:
      number: GPIO14
      mode: INPUT_PULLUP
    filters:
      - invert:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_press:
      - switch.toggle: relay

sensor:
  - platform: wifi_signal
    id: wifi_db
    name: WiFi信号_WiFiSignal
    update_interval: 60s

  - platform: template
    id: wifi_quality
    name: WiFi质量_WiFiQuality
    lambda: |-
      float x = id(wifi_db).state;
      if (x <= -100) return 0;
      if (x >= -50) return 100;
      return 2 * (x + 100);
    unit_of_measurement: "%"

  - platform: template
    id: free_heap
    name: 剩余内存_FreeHeap
    lambda: |-
      return ESP.getFreeHeap();
    unit_of_measurement: "B"
    update_interval: 60s

  - platform: uptime
    id: uptime_sensor
    name: 运行时间_Uptime
    update_interval: 60s

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "设备IP"

button:
  - platform: restart
    name: "重启设备"
