esphome:
  name: ee
  friendly_name: 邦训小萌1s

esp8266:
  board: esp01_1m
  restore_from_flash: false

logger:
  baud_rate: 0

wifi:
  ssid: "CC"
  password: "chen1122"
  reboot_timeout: 0s
  ap:
    ssid: "EE-Setup"
    password: "12345678"

# 修正了这里的 OTA 格式
ota:
  platform: esphome
  password: "chen1122"

api:

web_server:
  port: 80

mqtt:
  broker: bemfa.com
  port: 9501
  username: "97109945d7e24559b3e4ca7a1f8ef160"
  password: "97109945d7e24559b3e4ca7a1f8ef160"
  client_id: "97109945d7e24559b3e4ca7a1f8ef160"
  keepalive: 60s
  discovery: false

  birth_message:
    topic: plug001/up
    payload: "online"
  will_message:
    topic: plug001/up
    payload: "offline"

  on_connect:
    then:
      - if:
          condition: switch.is_on: relay
          then:
            - mqtt.publish:
                topic: plug001/up
                payload: "on"
      - if:
          condition: switch.is_off: relay
          then:
            - mqtt.publish:
                topic: plug001/up
                payload: "off"

  on_message:
    - topic: plug001
      then:
        - lambda: |-
            if (x == "on" || x == "ON" || x == "1") {
              id(relay).turn_on();
            } else if (x == "off" || x == "OFF" || x == "0") {
              id(relay).turn_off();
            }

output:
  - platform: gpio
    id: relay_led_output
    pin:
      number: GPIO12
      inverted: true

  - platform: gpio
    id: wifi_led_output
    pin:
      number: GPIO13
      inverted: true

switch:
  - platform: gpio
    id: relay
    name: "插座开关"
    pin: GPIO15
    
    on_turn_on:
      - output.turn_on: relay_led_output
      - mqtt.publish:
          topic: plug001/set
          payload: "on"
    on_turn_off:
      - output.turn_off: relay_led_output
      - mqtt.publish:
          topic: plug001/set
          payload: "off"

interval:
  - interval: 1000ms
    then:
      - if:
          condition: wifi.connected
          then:
            - output.turn_off: wifi_led_output
          else:
            - lambda: |-
                static bool toggle_state = false;
                toggle_state = !toggle_state;
                if (toggle_state) {
                  id(wifi_led_output).turn_on();
                } else {
                  id(wifi_led_output).turn_off();
                }

binary_sensor:
  - platform: gpio
    id: button_input
    internal: true
    pin:
      number: GPIO14
      mode: INPUT_PULLUP
    filters:
      - invert:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_press:
      - switch.toggle: relay
