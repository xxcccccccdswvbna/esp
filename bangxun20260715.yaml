esphome:
  name: ee
  friendly_name: 邦训小萌1s

esp8266:
  board: esp01_1m
  restore_from_flash: true

logger:
  baud_rate: 0

api:

ota:
  - platform: esphome
    password: "chen1122"

wifi:
  ssid: "CC"
  password: "chen1122"
  min_auth_mode: WPA2
  reboot_timeout: 0s
  ap:
    ssid: "EE-Setup"
    password: "12345678"

captive_portal:

web_server:
  port: 80

mqtt:
  broker: bemfa.com
  port: 9501
  username: "97109945d7e24559b3e4ca7a1f8ef160"
  password: "97109945d7e24559b3e4ca7a1f8ef160"
  client_id: "97109945d7e24559b3e4ca7a1f8ef160"
  keepalive: 30s
  discovery: false

  birth_message:
    topic: plug001/up
    payload: "online"

  will_message:
    topic: plug001/up
    payload: "offline"

  on_connect:
    then:
      - if:
          condition:
            switch.is_on: relay
          then:
            - mqtt.publish:
                topic: plug001/up
                payload: "on"

      - if:
          condition:
            switch.is_off: relay
          then:
            - mqtt.publish:
                topic: plug001/up
                payload: "off"

  on_message:
    - topic: plug001
      then:
        - lambda: |-
            if (x == "on" || x == "ON" || x == "1") {
              id(relay).turn_on();
            } else if (x == "off" || x == "OFF" || x == "0") {
              id(relay).turn_off();
            }


binary_sensor:
  - platform: gpio
    id: button_input
    internal: true
    pin:
      number: GPIO14
      mode: INPUT_PULLUP

    filters:
      - invert:
      - delayed_on: 50ms
      - delayed_off: 50ms

    on_press:
      - switch.toggle: relay


switch:
  - platform: gpio
    id: relay
    name: "插座开关"
    pin: GPIO15

    on_turn_on:
      - switch.turn_on: relay_led
      - mqtt.publish:
          topic: plug001/set
          payload: "on"

    on_turn_off:
      - switch.turn_off: relay_led
      - mqtt.publish:
          topic: plug001/set
          payload: "off"


  - platform: gpio
    id: relay_led
    internal: true
    pin:
      number: GPIO12
      inverted: true


  - platform: gpio
    id: wifi_led
    name: "WiFi状态灯"
    pin:
      number: GPIO13
      inverted: true
    restore_mode: RESTORE_DEFAULT_ON
sensor:
  - platform: wifi_signal
    id: wifi_db
    name: "WiFi信号_WiFiSignal"
    update_interval: 60s

  - platform: template
    name: "WiFi质量_WiFiQuality"
    lambda: |-
      float x = id(wifi_db).state;
      if (x <= -100) return 0;
      if (x >= -50) return 100;
      return 2 * (x + 100);
    unit_of_measurement: "%"

  - platform: template
    name: "剩余内存"
    lambda: |-
      return ESP.getFreeHeap();
    unit_of_measurement: "B"
    update_interval: 60s

  - platform: uptime
    name: "运行时间"
    update_interval: 60s


text_sensor:
  - platform: wifi_info
    ip_address:
      name: "设备IP"


button:
  - platform: restart
    name: "重启设备"