            else if (x == "off" || x == "OFF" || x == "0") {
              id(relay).turn_off();
            }

# ==========================
# LED状态保存
# ==========================

globals:

  # GPIO12 继电器灯允许
  - id: relay_led_enable
    type: bool
    restore_value: yes
    initial_value: "true"

  # GPIO13 WiFi灯允许
  - id: wifi_led_enable
    type: bool
    restore_value: yes
    initial_value: "true"

# ==========================
# LED统一管理
# ==========================

script:

  - id: update_leds
    mode: restart

    then:
      # 继电器指示灯
      - if:
          condition:
            lambda: |-
              return id(relay_led_enable)
                     && id(relay).state;
          then:
            - switch.turn_on: relay_led_output
          else:
            - switch.turn_off: relay_led_output

switch:

  # =====================
  # LED底层输出 (作为内部开关)
  # =====================

  - platform: gpio
    id: relay_led_output
    pin:
      number: GPIO12
      inverted: true
    internal: true

  - platform: gpio
    id: wifi_led_output
    pin:
      number: GPIO13
      inverted: true
    internal: true

  # =====================
  # 插座继电器 GPIO15
  # =====================

  - platform: gpio
    id: relay
    name: "插座开关"
    pin: GPIO15

    on_turn_on:
      - script.execute: update_leds
      - mqtt.publish:
          topic: plug001/set
          payload: "on"

    on_turn_off:
      - script.execute: update_leds
      - mqtt.publish:
          topic: plug001/set
          payload: "off"

  # =====================
  # 继电器指示灯允许开关
  #
  # ON  = 跟随继电器
  # OFF = 强制关闭
  # =====================

  - platform: template
    id: relay_led_switch
    name: "继电器指示灯"

    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

    turn_on_action:
      - lambda: |-
          id(relay_led_enable) = true;
      - script.execute: update_leds

    turn_off_action:
      - lambda: |-
          id(relay_led_enable) = false;
      - script.execute: update_leds

  # =====================
  # WiFi指示灯允许开关
  #
  # ON  = WiFi状态灯
  # OFF = 强制关闭
  # =====================

  - platform: template
    id: wifi_led_switch
    name: "WiFi指示灯"

    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

    turn_on_action:
      - lambda: |-
          id(wifi_led_enable) = true;

    turn_off_action:
      - lambda: |-
          id(wifi_led_enable) = false;
      - switch.turn_off: wifi_led_output

# ==========================
# 按键 GPIO14
# ==========================

binary_sensor:

  - platform: gpio
    id: button_input
    internal: true

    pin:
      number: GPIO14
      mode: INPUT_PULLUP

    filters:
      - invert:
      - delayed_on: 50ms
      - delayed_off: 50ms

    on_press:
      - switch.toggle: relay

# ==========================
# WiFi灯状态控制
#
# 500ms检测一次
#
# 未连接 WiFi -> 闪烁
# 已连接     -> 灭
# 关闭开关   -> 灭
# ==========================

interval:

  - interval: 500ms
    then:

      - if:
          condition:
            lambda: |-
              return !id(wifi_led_enable);
          then:
            - switch.turn_off: wifi_led_output

      - if:
          condition:
            and:
              - lambda: |-
                  return id(wifi_led_enable);
              - not:
                  wifi.connected
          then:
            - switch.toggle: wifi_led_output

      - if:
          condition:
            and:
              - lambda: |-
                  return id(wifi_led_enable);
              - wifi.connected
          then:
            - switch.turn_off: wifi_led_output

sensor:

  # WiFi信号
  - platform: wifi_signal
    id: wifi_db
    name: "WiFi信号_WiFiSignal"
    update_interval: 60s

  # WiFi质量百分比
  - platform: template
    id: wifi_quality
    name: "WiFi质量_WiFiQuality"

    lambda: |-
      float x = id(wifi_db).state;

      if (x <= -100)
        return 0;

      if (x >= -50)
        return 100;

      return 2 * (x + 100);
    unit_of_measurement: "%"

  # ESP8266剩余内存
  - platform: template
    id: free_heap
    name: "剩余内存_FreeHeap"
    lambda: |-
      return ESP.getFreeHeap();
    unit_of_measurement: "B"
    update_interval: 60s

  # 运行时间
  - platform: uptime
    id: uptime_sensor
    name: "运行时间_Uptime"
    update_interval: 60s

text_sensor:

  # IP地址
  - platform: wifi_info
    ip_address:
      name: "设备IP"

button:

  # 重启
  - platform: restart
    name: "重启设备"
