esphome:
  name: ee
  friendly_name: 邦训小萌1s

esp8266:
  board: esp01_1m
  restore_from_flash: true

logger:
  baud_rate: 0

api:

ota:
  - platform: esphome
    password: "chen1122"

wifi:
  ssid: "CC"
  password: "chen1122"
  min_auth_mode: WPA2
  reboot_timeout: 0s
  ap:
    ssid: "EE-Setup"
    password: "12345678"

captive_portal:

web_server:
  port: 80

mqtt:
  broker: bemfa.com
  port: 9501
  username: "97109945d7e24559b3e4ca7a1f8ef160"
  password: "97109945d7e24559b3e4ca7a1f8ef160"
  client_id: "97109945d7e24559b3e4ca7a1f8ef160"
  keepalive: 30s
  discovery: false

  birth_message:
    topic: plug001/up
    payload: "online"

  will_message:
    topic: plug001/up
    payload: "offline"

  on_connect:
    then:
      - if:
          condition:
            switch.is_on: relay
          then:
            - mqtt.publish:
                topic: plug001/up
                payload: "on"

      - if:
          condition:
            switch.is_off: relay
          then:
            - mqtt.publish:
                topic: plug001/up
                payload: "off"

  on_message:
    - topic: plug001
      then:
        - lambda: |-
            if (x == "on" || x == "ON" || x == "1") {
              id(relay).turn_on();
            } else if (x == "off" || x == "OFF" || x == "0") {
              id(relay).turn_off();
            }

binary_sensor:
  - platform: gpio
    id: button_input
    internal: true
    pin:
      number: GPIO14
      mode: INPUT_PULLUP

    filters:
      - invert:
      - delayed_on: 50ms
      - delayed_off: 50ms

    on_press:
      - switch.toggle: relay

switch:
  # 1. 新增的开关：用于控制继电器指示灯的总开关
  - platform: template
    id: relay_led_enable
    name: "继电器指示灯"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    
    # 当此开关被打开时，检查插座状态，若插座开着则点亮指示灯
    on_turn_on:
      - if:
          condition:
            switch.is_on: relay
          then:
            - switch.turn_on: relay_led
            
    # 当此开关被关闭时，直接熄灭指示灯
    on_turn_off:
      - switch.turn_off: relay_led

  # 2. 插座开关
  - platform: gpio
    id: relay
    name: "插座开关"
    pin: GPIO15

    on_turn_on:
      # 插座打开时，直接尝试点亮指示灯
      # 如果此时 relay_led_enable 是关闭的，灯不会亮（由 relay_led_enable 的逻辑保证）
      # 等等，这里如果直接 turn_on，会绕过 relay_led_enable 的检查！
      # 所以这里依然需要判断，或者让 relay_led_enable 来接管。
      # 最严谨的做法：插座打开时，判断指示灯总开关是否开启
      - if:
          condition:
            switch.is_on: relay_led_enable
          then:
            - switch.turn_on: relay_led
      - mqtt.publish:
          topic: plug001/set
          payload: "on"

    on_turn_off:
      # 插座关闭时，无条件熄灭指示灯
      - switch.turn_off: relay_led
      - mqtt.publish:
          topic: plug001/set
          payload: "off"

  # 3. 继电器指示灯实体
  - platform: gpio
    id: relay_led
    internal: true
    pin:
      number: GPIO12
      inverted: true

  # 4. WiFi状态灯
  - platform: gpio
    id: wifi_led
    name: "WiFi状态灯"
    pin:
      number: GPIO13
      inverted: true
    restore_mode: RESTORE_DEFAULT_ON

sensor:
  - platform: wifi_signal
    id: wifi_db
    name: WiFi信号_WiFiSignal
    update_interval: 60s

  - platform: template
    id: wifi_quality
    name: WiFi质量_WiFiQuality
    lambda: |-
      float x = id(wifi_db).state;
      if (x <= -100) return 0;
      if (x >= -50) return 100;
      return 2 * (x + 100);
    unit_of_measurement: "%"

  - platform: template
    id: free_heap
    name: 剩余内存_FreeHeap
    lambda: |-
      return ESP.getFreeHeap();
    unit_of_measurement: "B"
    update_interval: 60s

  - platform: uptime
    id: uptime_sensor
    name: 运行时间_Uptime
    update_interval: 60s

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "设备IP"

button:
  - platform: restart
    name: "重启设备"
