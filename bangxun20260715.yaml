  username: "97109945d7e24559b3e4ca7a1f8ef160"
  password: "97109945d7e24559b3e4ca7a1f8ef160"
  client_id: "97109945d7e24559b3e4ca7a1f8ef160"
  keepalive: 30s
  discovery: false

  birth_message:
    topic: plug001/up
    payload: "online"

  will_message:
    topic: plug001/up
    payload: "offline"

  on_connect:
    then:
      - if:
          condition:
            switch.is_on: relay
          then:
            - mqtt.publish:
                topic: plug001/up
                payload: "on"
      - if:
          condition:
            switch.is_off: relay
          then:
            - mqtt.publish:
                topic: plug001/up
                payload: "off"

  on_message:
    - topic: plug001
      then:
        - lambda: |-
            if (x == "on" || x == "ON" || x == "1") {
              id(relay).turn_on();
            } else if (x == "off" || x == "OFF" || x == "0") {
              id(relay).turn_off();
            }

# ================= 核心控制区 =================

# 1. 底层输出：纯粹控制 GPIO 引脚
output:
  # 继电器指示灯
  - platform: gpio
    id: relay_led_output
    pin:
      number: GPIO12
      inverted: true
      
  # WiFi 状态灯
  - platform: gpio
    id: wifi_led_output
    pin:
      number: GPIO13
      inverted: true 

# 2. 继电器灯同步脚本 (只管 GPIO12)
script:
  - id: update_relay_led
    mode: restart
    then:
      - if:
          condition:
            lambda: |-
              return id(relay).state && id(relay_led_enable).state;
          then:
            - output.turn_on: relay_led_output
          else:
            - output.turn_off: relay_led_output

# 3. 实体开关定义
switch:
  # 插座开关
  - platform: gpio
    id: relay
    name: "插座开关"
    pin: GPIO15

    on_turn_on:
      - script.execute: update_relay_led
      - mqtt.publish:
          topic: plug001/set
          payload: "on"

    on_turn_off:
      - script.execute: update_relay_led
      - mqtt.publish:
          topic: plug001/set
          payload: "off"

  # 继电器指示灯总开关（仅做状态存储）
  - platform: template
    id: relay_led_enable
    name: "继电器指示灯"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    turn_on_action:
      - script.execute: update_relay_led
    turn_off_action:
      - script.execute: update_relay_led

  # WiFi状态灯允许开关（仅做状态存储，实际控制由 interval 接管）
  - platform: template
    id: wifi_led_switch
    name: "WiFi指示灯"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

# 4. WiFi 状态独立检测逻辑 (只管 GPIO13)
interval:
  - interval: 500ms
    then:
      # 如果 WiFi 指示灯功能被前端手动关闭，则强制熄灭
      - if:
          condition:
            lambda: return !id(wifi_led_switch).state;
          then:
            - output.turn_off: wifi_led_output

      # 如果功能开启，但未连接 WiFi -> 手动闪烁
      - if:
          condition:
            and:
              - lambda: return id(wifi_led_switch).state;
              - not: wifi.connected
          then:
            - lambda: |-
                static bool toggle_state = false;
                toggle_state = !toggle_state;
                if (toggle_state) {
                  id(wifi_led_output).turn_on();
                } else {
                  id(wifi_led_output).turn_off();
                }

      # 如果功能开启，且已连接 WiFi -> 熄灭
      - if:
          condition:
            and:
              - lambda: return id(wifi_led_switch).state;
              - wifi.connected
          then:
            - output.turn_off: wifi_led_output

# ================= 核心控制区结束 =================

binary_sensor:
  - platform: gpio
    id: button_input
    internal: true
    pin:
      number: GPIO14
      mode: INPUT_PULLUP
    filters:
      - invert:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_press:
      - switch.toggle: relay

sensor:
  - platform: wifi_signal
    id: wifi_db
    name: WiFi信号_WiFiSignal
    update_interval: 60s

  - platform: template
    id: wifi_quality
    name: WiFi质量_WiFiQuality
    lambda: |-
      float x = id(wifi_db).state;
      if (x <= -100) return 0;
      if (x >= -50) return 100;
      return 2 * (x + 100);
    unit_of_measurement: "%"

  - platform: template
    id: free_heap
    name: 剩余内存_FreeHeap
    lambda: |-
      return ESP.getFreeHeap();
    unit_of_measurement: "B"
    update_interval: 60s

  - platform: uptime
    id: uptime_sensor
    name: "运行时间_Uptime"
    update_interval: 60s

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "设备IP"

button:
  - platform: restart
    name: "重启设备"
