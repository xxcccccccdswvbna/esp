esphome:
  name: bangxun
  friendly_name: 邦训小萌1s

esp8266:
  board: esp01_1m
  restore_from_flash: true

logger:
  baud_rate: 0

api:

ota:
  - platform: esphome
    password: "chen1122"

wifi:
  ssid: "CC"
  password: "chen1122"
  min_auth_mode: WPA2
  reboot_timeout: 0s
  fast_connect: true
  ap:
    ssid: "EE-Setup"
    password: "12345678"

captive_portal:

mqtt:
  broker: bemfa.com
  port: 9501
  username: "97109945d7e24559b3e4ca7a1f8ef160"
  password: "97109945d7e24559b3e4ca7a1f8ef160"
  client_id: "97109945d7e24559b3e4ca7a1f8ef160"
  keepalive: 30s
  discovery: false

  birth_message:
    topic: plug001/up
    payload: online

  will_message:
    topic: plug001/up
    payload: offline

  on_message:
    - topic: plug001
      then:
        - lambda: |-
            if (x == "on" || x == "ON" || x == "1")
              id(relay).turn_on();
            else if (x == "off" || x == "OFF" || x == "0")
              id(relay).turn_off();

binary_sensor:
  - platform: gpio
    id: button_input
    internal: true
    pin:
      number: GPIO14
      mode: INPUT_PULLUP
    filters:
      - invert:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_press:
      - switch.toggle: relay

switch:
  - platform: gpio
    id: relay
    name: "插座开关"
    pin: GPIO15
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      - switch.turn_on: relay_led
      - mqtt.publish:
          topic: plug001/up
          payload: on
    on_turn_off:
      - switch.turn_off: relay_led
      - mqtt.publish:
          topic: plug001/up
          payload: off

  - platform: gpio
    id: relay_led
    name: "继电器指示灯"
    pin:
      number: GPIO12
      inverted: true
    restore_mode: RESTORE_DEFAULT_ON

  - platform: gpio
    id: wifi_led
    name: "WiFi状态灯"
    pin:
      number: GPIO13
      inverted: true
    restore_mode: RESTORE_DEFAULT_ON

sensor:
  - platform: wifi_signal
    name: "WiFi信号"
    update_interval: 60s

  - platform: template
    name: "剩余内存"
    lambda: |-
      return ESP.getFreeHeap();
    unit_of_measurement: "B"
    update_interval: 60s

  - platform: uptime
    name: "运行时间"
    update_interval: 60s

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "设备IP"

  - platform: template
    name: "重启原因"
    lambda: |-
      return std::string(ESP.getResetReason().c_str());
    update_interval: never

button:
  - platform: restart
    name: "重启设备"