mqtt:
  broker: bemfa.com
  port: 9501
  username: "97109945d7e24559b3e4ca7a1f8ef160"
  password: "97109945d7e24559b3e4ca7a1f8ef160"
  client_id: "97109945d7e24559b3e4ca7a1f8ef160"
  keepalive: 30s
  discovery: false

  birth_message:
    topic: plug001/up
    payload: "online"

  will_message:
    topic: plug001/up
    payload: "offline"

  on_connect:
    then:
      - if:
          condition:
            switch.is_on: relay
          then:
            - mqtt.publish:
                topic: plug001/up
                payload: "on"
      - if:
          condition:
            switch.is_off: relay
          then:
            - mqtt.publish:
                topic: plug001/up
                payload: "off"

  on_message:
    - topic: plug001
      then:
        - lambda: |-
            if (x == "on" || x == "ON" || x == "1") {
              id(relay).turn_on();
            } else if (x == "off" || x == "OFF" || x == "0") {
              id(relay).turn_off();
            }

# ================= 核心控制区：单一脚本收口架构 =================

# 1. 唯一更新 LED 状态的脚本（所有状态同步都在这里完成）
script:
  - id: update_relay_led
    mode: restart
    then:
      - if:
          condition:
            lambda: |-
              return id(relay).state && id(relay_led_enable).state;
          then:
            - switch.turn_on: relay_led
          else:
            - switch.turn_off: relay_led

# 2. 开关实体定义
switch:
  # 插座开关
  - platform: gpio
    id: relay
    name: "插座开关"
    pin: GPIO15

    on_turn_on:
      - script.execute: update_relay_led
      - mqtt.publish:
          topic: plug001/set
          payload: "on"

    on_turn_off:
      - script.execute: update_relay_led
      - mqtt.publish:
          topic: plug001/set
          payload: "off"

  # 继电器指示灯（允许/禁止 LED 亮的总开关）
  - platform: template
    id: relay_led_enable
    name: "继电器指示灯"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

    turn_on_action:
      - script.execute: update_relay_led

    turn_off_action:
      - script.execute: update_relay_led

  # 继电器指示灯实体（底层 GPIO，不暴露给 HA）
  - platform: gpio
    id: relay_led
    internal: true
    pin:
      number: GPIO12
      inverted: true

  # WiFi状态灯
  - platform: gpio
    id: wifi_led
    name: "WiFi状态灯"
    pin:
      number: GPIO13
      inverted: true
    restore_mode: RESTORE_DEFAULT_ON

# ================= 核心控制区结束 =================

binary_sensor:
  - platform: gpio
    id: button_input
    internal: true
    pin:
      number: GPIO14
      mode: INPUT_PULLUP
    filters:
      - invert:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_press:
      - switch.toggle: relay

sensor:
  - platform: wifi_signal
    id: wifi_db
    name: WiFi信号_WiFiSignal
    update_interval: 60s

  - platform: template
    id: wifi_quality
    name: WiFi质量_WiFiQuality
    lambda: |-
      float x = id(wifi_db).state;
      if (x <= -100) return 0;
      if (x >= -50) return 100;
      return 2 * (x + 100);
    unit_of_measurement: "%"

  - platform: template
    id: free_heap
    name: 剩余内存_FreeHeap
    lambda: |-
      return ESP.getFreeHeap();
    unit_of_measurement: "B"
    update_interval: 60s

  - platform: uptime
    id: uptime_sensor
    name: 运行时间_Uptime
    update_interval: 60s

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "设备IP"

button:
  - platform: restart
    name: "重启设备"
