esphome:
  name: ee
  friendly_name: 邦训小萌1s
  # 启动时根据开关状态初始化 WiFi 指示灯
  on_boot:
    priority: -100
    then:
      - if:
          condition:
            and:
              - wifi.connected
              - switch.is_on: wifi_led_switch
          then:
            - switch.turn_on: wifi_led

esp8266:
  board: esp01_1m

# ================= 核心优化 1：闪存寿命保护 =================
preferences:
  flash_write_interval: 10min # 延迟闪存写入，彻底解决频繁开关导致变砖

# ================= 核心优化 2：榨干每一滴 RAM =================
logger:
  level: NONE # 完全关闭日志引擎，释放大量基础内存

# api: # 已注释，不需要 HA 局域网接入就不要开，极其耗内存

ota:
  - platform: esphome
    password: "chen1122"

# 开启极简本地模式，省下70% Web内存，只需浏览器访问 IP/update 即可传固件
web_server:
  port: 80
  version: 2
  local: true  

# ================= 核心优化 3：网络防掉线与降温 =================
wifi:
  ssid: "CC"
  password: "chen1122"
  min_auth_mode: WPA2
  reboot_timeout: 0s
  
  # 彻底解决 "Roam scan" 导致的掉线和 MQTT 死循环重连
  fast_connect: true     
  output_power: 17.0dBm  # 降低发射功率，减少芯片发热

  ap:
    ssid: "EE-Setup"
    password: "12345678"

  # 事件驱动：连上 WiFi 且允许亮灯时才亮，0 轮询开销！
  on_connect:
    - if:
        condition:
          switch.is_on: wifi_led_switch
        then:
          - switch.turn_on: wifi_led
  # 断开时直接灭灯
  on_disconnect:
    - switch.turn_off: wifi_led

captive_portal:

# ================= 核心优化 4：底层默默守护网络的时间栈 =================
time:
  - platform: sntp
    id: sntp_time
    timezone: Asia/Shanghai
    # 无任何 on_time 任务，0 CPU 消耗，纯粹为了让 MQTT 握手成功不掉线

mqtt:
  broker: bemfa.com
  port: 9501
  username: "97109945d7e24559b3e4ca7a1f8ef160"
  password: "97109945d7e24559b3e4ca7a1f8ef160"
  client_id: "97109945d7e24559b3e4ca7a1f8ef160"
  keepalive: 30s 
  discovery: false
  
  # 留空以防瞬间数据包堵塞网络
  birth_message: 
  will_message: 

  on_connect:
    then:
      - if:
          condition:
            switch.is_on: relay
          then:
            - mqtt.publish:
                topic: plug001/up
                payload: "on"
      - if:
          condition:
            switch.is_off: relay
          then:
            - mqtt.publish:
                topic: plug001/up
                payload: "off"

  on_message:
    - topic: plug001
      then:
        - lambda: |-
            if (x == "on" || x == "ON" || x == "1") {
              id(relay).turn_on();
            } else if (x == "off" || x == "OFF" || x == "0") {
              id(relay).turn_off();
            }

# ================= 核心控制区 (纯事件驱动，无任何 Interval 循环) =================

binary_sensor:
  - platform: gpio
    id: button_input
    internal: true
    pin:
      number: GPIO14
      mode: INPUT_PULLUP
    filters:
      - invert:
      - delayed_on: 20ms # 20ms 防抖足矣
    on_press:
      - switch.toggle: relay

switch:
  # 1. 物理插座开关
  - platform: gpio
    id: relay
    name: "插座开关"
    pin: GPIO15
    on_turn_on:
      - if:
          condition:
            switch.is_on: relay_led_enable
          then:
            - switch.turn_on: relay_led
      - mqtt.publish:
          topic: plug001/set
          payload: "on"
    on_turn_off:
      - switch.turn_off: relay_led
      - mqtt.publish:
          topic: plug001/set
          payload: "off"

  # 2. 继电器指示灯前端控制
  - platform: template
    id: relay_led_enable
    name: "继电器指示灯"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    on_turn_on:
      - if:
          condition:
            switch.is_on: relay
          then:
            - switch.turn_on: relay_led
    on_turn_off:
      - switch.turn_off: relay_led

  # 3. WiFi指示灯前端控制
  - platform: template
    id: wifi_led_switch
    name: "WiFi指示灯"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    on_turn_on:
      - if:
          condition:
            wifi.connected
          then:
            - switch.turn_on: wifi_led
    on_turn_off:
      - switch.turn_off: wifi_led

  # 4. 内部硬件引脚定义 (不对外暴露)
  - platform: gpio
    id: relay_led
    internal: true
    pin:
      number: GPIO12
      inverted: true

  - platform: gpio
    id: wifi_led
    internal: true
    pin:
      number: GPIO13
      inverted: true

# ================= 轻量级监控 =================
sensor:
  # 仅保留纯数字自增的运行时长，0 内存波动
  - platform: uptime
    id: uptime_sensor
    name: "运行时长"
    update_interval: 60s

button:
  - platform: restart
    name: "重启设备"
