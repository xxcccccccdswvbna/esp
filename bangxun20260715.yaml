esphome:
  name: ee
  friendly_name: 邦训小萌1s
  on_boot:
    priority: -100
    then:
      - script.execute: update_relay_led

esp8266:
  board: esp01_1m
  # 已移除废弃的 restore_from_flash: true

# ================= 核心优化 1：闪存读写保护 =================
preferences:
  flash_write_interval: 10min # 延迟闪存写入。状态改变后在内存中缓存，10分钟后统一写入闪存，极大延长设备寿命

# ================= 核心优化 2：释放 RAM =================
logger:
  level: NONE # 完全关闭日志引擎（仅 baud_rate: 0 仍会占用缓存内存）

api:

ota:
  - platform: esphome
    password: "chen1122"

wifi:
  ssid: "CC"
  password: "chen1122"
  min_auth_mode: WPA2
  reboot_timeout: 0s
  ap:
    ssid: "EE-Setup"
    password: "12345678"

captive_portal:

# 注意：Web Server 在 ESP8266 上占用极大内存（约 10-15KB）。如果不需要网页控制，建议直接注释掉以下两行
web_server:
  port: 80

mqtt:
  broker: bemfa.com
  port: 9501
  username: "97109945d7e24559b3e4ca7a1f8ef160"
  password: "97109945d7e24559b3e4ca7a1f8ef160"
  client_id: "97109945d7e24559b3e4ca7a1f8ef160"
  keepalive: 30s
  discovery: false
  birth_message:
    topic: plug001/up
    payload: "online"
  will_message:
    topic: plug001/up
    payload: "offline"
  on_connect:
    then:
      - mqtt.publish:
          topic: plug001/up
          payload: !lambda 'return id(relay).state ? "on" : "off";' # 优化：合并条件判断
  on_message:
    - topic: plug001
      then:
        - lambda: |-
            if (x == "on" || x == "ON" || x == "1") {
              id(relay).turn_on();
            } else if (x == "off" || x == "OFF" || x == "0") {
              id(relay).turn_off();
            }

# ================= 核心控制区 =================

output:
  - platform: gpio
    id: relay_led_output
    pin:
      number: GPIO12
      inverted: true
      
  - platform: gpio
    id: wifi_led_output
    pin:
      number: GPIO13
      inverted: true 

script:
  - id: update_relay_led
    mode: restart
    then:
      - output.set_level:
          id: relay_led_output
          level: !lambda 'return (id(relay).state && id(relay_led_enable).state) ? 1.0 : 0.0;' # 优化：消除繁琐的 if/else 动作队列

switch:
  - platform: gpio
    id: relay
    name: "插座开关"
    pin: GPIO15
    on_turn_on:
      - script.execute: update_relay_led
      - mqtt.publish:
          topic: plug001/set
          payload: "on"
    on_turn_off:
      - script.execute: update_relay_led
      - mqtt.publish:
          topic: plug001/set
          payload: "off"

  - platform: template
    id: relay_led_enable
    name: "继电器指示灯"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    turn_on_action:
      - script.execute: update_relay_led
    turn_off_action:
      - script.execute: update_relay_led

  - platform: template
    id: wifi_led_switch
    name: "WiFi指示灯"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

# ================= 核心优化 3：精简循环开销 =================
interval:
  - interval: 500ms
    then:
      - lambda: |-
          // 使用原生 C++ 逻辑替代 YAML 动作树，大幅减少每次执行的 CPU 查表和内存分配开销
          if (!id(wifi_led_switch).state) {
            id(wifi_led_output).turn_off();
          } else if (network::is_connected()) {
            id(wifi_led_output).turn_on();
          } else {
            static bool toggle = false;
            toggle = !toggle;
            if (toggle) id(wifi_led_output).turn_on();
            else id(wifi_led_output).turn_off();
          }

# ================= 核心控制区结束 =================

binary_sensor:
  - platform: gpio
    id: button_input
    internal: true
    pin:
      number: GPIO14
      mode: INPUT_PULLUP
    filters:
      - invert:
      - delayed_on: 20ms # 优化：通常按键防抖 20ms 足矣，无需 off 延时，减少定时器内存消耗
    on_press:
      - switch.toggle: relay

sensor:
  - platform: wifi_signal
    id: wifi_db
    name: WiFi信号_WiFiSignal
    update_interval: 60s

  - platform: template
    id: wifi_quality
    name: WiFi质量_WiFiQuality
    lambda: |-
      float x = id(wifi_db).state;
      if (x <= -100) return 0;
      if (x >= -50) return 100;
      return 2 * (x + 100);
    unit_of_measurement: "%"

  - platform: template
    id: free_heap
    name: 剩余内存_FreeHeap
    lambda: |-
      return ESP.getFreeHeap();
    unit_of_measurement: "B"
    update_interval: 60s

  - platform: uptime
    id: uptime_sensor
    name: "运行时间_Uptime"
    update_interval: 60s

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "设备IP"

button:
  - platform: restart
    name: "重启设备"
