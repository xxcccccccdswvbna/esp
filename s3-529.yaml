# ========== 稳定版 Dev3 状态监听 (融合去重 + 防冲突) ==========
esp32_ble_tracker:
  scan_parameters:
    interval: 100ms
    window: 100ms
    active: true
    continuous: true
  on_ble_advertise:
    then:
      - lambda: |-
          // 1. 获取设备信息
          std::string raw_mac = x.address_str();
          int rssi = x.get_rssi();
          ESP_LOGD("BLE_DEBUG", ">>> Adv from: [%s] RSSI=%d", raw_mac.c_str(), rssi);
          
          // 🔍 调试：打印所有厂商数据的 UUID（确认是否收到 0x134D）
          auto mfr_datas = x.get_manufacturer_datas();
          for (const auto &md : mfr_datas) {
            ESP_LOGI("UUID_DEBUG", "Device %s UUID: %s | Len: %d", 
                     raw_mac.c_str(), md.uuid.to_string().c_str(), md.data.size());
          }
          
          // 2. 如果无厂商数据，直接返回（跳过后续解析）
          if (mfr_datas.empty()) return;
          
          for (const auto &md : mfr_datas) {
            // 检查 Company ID 0x134D
            if (md.uuid != esp32_ble_tracker::ESPBTUUID::from_uint16(0x134D)) continue;
            
            // 3. MAC 过滤（转大写比对）
            std::string target_mac = "00:00:70:27:80:48";
            std::string mac_upper = raw_mac;
            std::transform(mac_upper.begin(), mac_upper.end(), mac_upper.begin(), ::toupper);
            std::transform(target_mac.begin(), target_mac.end(), target_mac.begin(), ::toupper);
            if (mac_upper != target_mac) continue;
            
            // 4. 解析字段 (基于最新抓包校准)
            auto &p = md.data;
            if (p.size() < 20) continue;
            if (p[0] != 0x21) continue;
            
            uint8_t mode = p[10];
            uint8_t brt_val = p[11];
            uint8_t fan_idx = p[19];
            
            bool light_on = (mode & 0x01);
            bool fan_on = (mode != 0x10 && mode != 0x11);
            int fan_speed = fan_on ? (fan_idx + 1) : 0;
            int brightness = (brt_val * 100) / 255;
            
            // 5. 防冲突 & 发布状态
            if (id(is_sending)) return;
            
            id(dev3_power).publish_state(light_on);
            id(dev3_fan_running).publish_state(fan_on);
            id(dev3_fan_speed).publish_state(fan_speed);
            id(dev3_brightness).publish_state(brightness);
            
            ESP_LOGI("midea_ble", "✅ Dev3: Light=%d Fan=%d(Spd%d) BRT=%d%%",
                     light_on, fan_on, fan_speed, brightness);
          }
# ========== Dev3 状态实体 ==========
