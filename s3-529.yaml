esphome:
  name: midea-dual-control
  friendly_name: Midea Dual Control
  # ✅ 启动延迟：让射频初始化完成后再广播，避免抢占
  on_boot:
    - priority: 600
      then:
        - delay: 2s

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    version: recommended
    # ✅ 必须缩进到 framework 下，否则编译报错
    sdkconfig_options:
      CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"
      CONFIG_FREERTOS_HZ: "1000"

logger:
  level: VERY_VERBOSE  # ← 临时最高级别，确保不丢日志
  logs:
    esp32_ble: DEBUG
    esp32_ble_tracker: DEBUG
    esp32_ble_tracker.scanner: DEBUG
    SCAN_TEST: INFO    # ← 确保测试日志可见
    BLE_RAW: INFO
    midea_ble: INFO

api:
  encryption:
    key: "4jGVSQw9/v+e8QCB/CSQIwGFcWS3Opo4oHSRbkq41RI="
  reboot_timeout: 1h

ota:
  platform: esphome
  password: "chen1122"

wifi:
  ssid: "CC"
  password: "chen1122"
  power_save_mode: none
  
bluetooth_proxy:
  active: true
  
esp32_ble:
  io_capability: none

esp32_ble_server:
  id: ble_server
  manufacturer_data: []

# ========== 全局变量 (防冲突 + 去重核心) ==========
globals:
  - id: last_cmd_time
    type: uint32_t
    initial_value: '0'
  - id: cmd_pkt
    type: std::vector<uint8_t>
    initial_value: 'std::vector<uint8_t>{}'
  - id: end_pkt
    type: std::vector<uint8_t>
    initial_value: 'std::vector<uint8_t>{}'
  - id: is_sending
    type: bool
    initial_value: 'false'
  - id: dev3_last_payload
    type: std::array<uint8_t, 24>
    initial_value: '{0}'
  - id: dev3_first_run
    type: bool
    initial_value: 'true'

# ========== 清空广播脚本 (防射频干扰) ==========
script:
  - id: clear_broadcast
    then:
      - delay: 500ms
      - lambda: |-
          std::vector<uint8_t> empty(26, 0x00);
          id(ble_server).set_manufacturer_data(empty);
      - delay: 500ms
      - globals.set: {id: is_sending, value: 'false'}

