esphome:
  name: midea-dual-control
  friendly_name: Midea Dual Control
  # ✅ 启动延迟：让 WiFi/BLE 协议栈稳定后再初始化广播，避免抢占射频
  on_boot:
    - priority: 600
      then:
        - delay: 2s

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    version: recommended
  sdkconfig_options:
    CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"
    CONFIG_FREERTOS_HZ: 1000

logger:
  level: INFO
  logs:
    esp32_ble: WARN
    esp32_ble_tracker: WARN
    midea_ble: INFO  # 保留自定义解析日志可见

api:
  encryption:
    key: "4jGVSQw9/v+e8QCB/CSQIwGFcWS3Opo4oHSRbkq41RI="
  reboot_timeout: 1h

ota:
  platform: esphome
  password: "chen1122"

wifi:
  ssid: "CC"
  password: "chen1122"
  power_save_mode: none

esp32_ble:
  io_capability: none

esp32_ble_server:
  id: ble_server
  manufacturer_data: []

# ========== 全局变量 ==========
globals:
  - id: last_cmd_time
    type: uint32_t
    initial_value: '0'
  - id: cmd_pkt
    type: std::vector<uint8_t>
    initial_value: 'std::vector<uint8_t>{}'
  - id: end_pkt
    type: std::vector<uint8_t>
    initial_value: 'std::vector<uint8_t>{}'

