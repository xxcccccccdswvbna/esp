# ========== 稳定版 Dev3 状态监听 ==========
esp32_ble_tracker:
  scan_parameters:
    interval: 800ms   # ✅ 平衡响应与稳定性，避开 WiFi 心跳冲突
    window: 800ms
    active: false
    continuous: true
  on_ble_advertise:
    then:
      - lambda: |-
          // 1. MAC 过滤
          std::string mac = x.address_str();
          if (mac != "00:00:70:27:80:48") return;
          
          // 2. 厂商数据过滤
          auto mfrs = x.get_manufacturer_datas();
          if (mfrs.empty()) return;
          
          for (const auto &md : mfrs) {
            if (md.uuid != esp32_ble_tracker::ESPBTUUID::from_uint16(0x134D)) continue;
            auto &p = md.data;
            if (p.size() < 20) continue;
            if (p[0] != 0x21) continue;  // 协议头校验
            
            // 3. 解析字段 (已校准)
            bool power_on = (p[9] == 0x01);
            bool fan_running = ((p[10] & 0x01) != 0);
            uint8_t fan_idx = p[19];
            uint16_t brt_raw = ((uint16_t)p[14] << 8) | p[15];
            int brightness = (brt_raw == 0xFFFF) ? 100 : (int)(brt_raw / 655.35f);
            
            // 4. 发布状态
            id(dev3_power).publish_state(power_on);
            id(dev3_fan_running).publish_state(fan_running);
            id(dev3_fan_speed).publish_state(fan_running ? (fan_idx + 1) : 0);
            id(dev3_brightness).publish_state(brightness);
            
            ESP_LOGI("midea_ble", "Dev3: Power=%d Fan=%d(Idx%d) BRT=%d%%", power_on, fan_running, fan_idx, brightness);
          }

# ========== 状态实体 ==========
binary_sensor:
  - platform: template
    name: "Dev3 Light Power"
    id: dev3_power
    device_class: light
    icon: mdi:ceiling-light
  - platform: template
    name: "Dev3 Fan Running"
    id: dev3_fan_running
    device_class: running
    icon: mdi:fan

sensor:
  - platform: template
    name: "Dev3 Fan Speed"
    id: dev3_fan_speed
    unit_of_measurement: "档"
    accuracy_decimals: 0
    icon: mdi:numeric
  - platform: template
    name: "Dev3 Brightness"
    id: dev3_brightness
    unit_of_measurement: "%"
    accuracy_decimals: 0
    icon: mdi:brightness-percent

# ========== 网络看门狗 ==========
interval:
  - interval: 60s
    then:
      - lambda: |-
          static uint32_t last_ok = 0;
          if (network::is_connected()) {
            last_ok = millis();
          } else if (millis() - last_ok > 180000) {
            ESP_LOGW("Watchdog", "Network lost >3min, rebooting...");
            delay(100);
            App.reboot();
          }
