esphome:
  name: smartoutletv1
  name_add_mac_suffix: True
  comment: 基于ESP32的墙壁智能插座，磁保持继电器+计量+LD2412人体存在。支持OTA与本地网页控制。
  project:
    name: "HA-DIYer.SmarOutlet-V1"
    version: "1.0.7"

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
api:

web_server:
  port: 80
  version: 2

wifi:
  ap:
    ssid: "SmartOutlet(V1) Hotspot"
    password: "12345678"

captive_portal:

substitutions:
  led_pin: GPIO27
  button_pin: GPIO0
  relay_a_pin: GPIO26
  relay_b_pin: GPIO25
  ld2412_tx_pin: GPIO19  
  ld2412_rx_pin: GPIO18  
  bl0940_tx_pin: GPIO21
  bl0940_rx_pin: GPIO5

globals:
   - id: var_energy
     type: float
     restore_value: yes
     initial_value: "0"

uart:
  - id: uart_bl0940
    tx_pin: $bl0940_tx_pin
    rx_pin: $bl0940_rx_pin
    baud_rate: 4800
    stop_bits: 1
    
  - id: uart_ld2412
    tx_pin: $ld2412_tx_pin
    rx_pin: $ld2412_rx_pin
    baud_rate: 115200 
    parity: NONE
    stop_bits: 1

output:
  - platform: gpio
    pin:
      number: $relay_a_pin
      mode:
        output: true
        pulldown: true
    id: relay_a_pin_output
  - platform: gpio
    pin:
      number: $relay_b_pin
      mode:
        output: true
        pulldown: true
    id: relay_b_pin_output

switch:
  - platform: template
    name: "Switch"
    id: outlet_switch
    device_class: outlet
    optimistic: True
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - output.turn_off: relay_a_pin_output
      - output.turn_on: relay_b_pin_output
      - delay: 100ms
      - output.turn_off: relay_b_pin_output
    turn_off_action:
      - output.turn_off: relay_b_pin_output
      - output.turn_on: relay_a_pin_output
      - delay: 100ms
      - output.turn_off: relay_a_pin_output

  - platform: restart
    name: "Restart"
    id: outlet_reset

  # 🌟 修复：移除 object_id，在 name 中加入唯一英文缩写 (Eng) 和 (BT)
  - platform: ld2412
    engineering_mode:
      name: "LD2412 工程模式 (Eng)"
      id: ld2412_eng_mode
    bluetooth:
      name: "LD2412 蓝牙控制 (BT)"
      id: ld2412_bluetooth

binary_sensor:
  - platform: gpio
    pin:
      number: $button_pin
      inverted: true
      mode:
        input: true
        pullup: true
    name: "button"
    internal: True
    on_click:
    - min_length: 50ms
      max_length: 350ms
      then:
        - if:
            condition:
              switch.is_on: outlet_switch
            then:
              - switch.turn_off: outlet_switch
            else:
              - switch.turn_on: outlet_switch
    on_multi_click:
      - timing:
          - ON for at least 10s
        then:
          - logger.log:
              level: INFO
              format: "FACTORY RESET"
          - button.press: btn_factory_reset

  # 🌟 修复：移除 object_id，在 name 中加入唯一英文缩写
  - platform: ld2412
    has_target:
      name: "LD2412 有人 (Target)"
      id: ld2412_target
    has_moving_target:
      name: "LD2412 微动 (Moving)"
      id: ld2412_moving
    has_still_target:
      name: "LD2412 静止 (Still)"
      id: ld2412_still

status_led:
  pin:
    number: $led_pin
    inverted: true

sensor:
  - platform: bl0940
    uart_id: uart_bl0940
    voltage:
      name: 'Voltage'
      accuracy_decimals: 0
    current:
      name: 'Current'
    power:
      name: 'Power'
      accuracy_decimals: 1
    energy:
      name: 'Energy'
      accuracy_decimals: 3
      id: bl0940_energy
    read_command: 0x58
    write_command: 0xA8
    legacy_mode: false
    resistor_one: 0.51
    resistor_two: 1950
    update_interval: 1s

  - platform: template
    name: "Total Daily Energy"
    id: bl0940_DailyEnergy
    device_class: energy
    accuracy_decimals: 3
    unit_of_measurement: 'kWh'
    update_interval: 1min
    lambda: |-
      if ((id(var_energy) > id(bl0940_energy).state) || (id(var_energy) == 0) || isnan(id(var_energy))) {
        id(var_energy) = id(bl0940_energy).state;
      }
      return id(bl0940_energy).state - id(var_energy);

  # 🌟 修复：移除 object_id，在 name 中加入唯一英文缩写 (如 MDist, SDist 等)
  - platform: ld2412
    moving_distance:
      name: "LD2412 运动距离 (MDist)"
      id: ld2412_moving_dist
    still_distance:
      name: "LD2412 静止距离 (SDist)"
      id: ld2412_still_dist
    moving_energy:
      name: "LD2412 运动能量 (MEnergy)"
      id: ld2412_moving_energy
    still_energy:
      name: "LD2412 静止能量 (SEnergy)"
      id: ld2412_still_energy
    detection_distance:
      name: "LD2412 检测距离 (Det)"
      id: ld2412_det_dist
    light:
      name: "LD2412 光照度 (Lux)"
      id: ld2412_light

ld2412:
  uart_id: uart_ld2412

number:
  - platform: bl0940
    current_calibration: { name: Current Calibration }
    voltage_calibration: { name: Voltage Calibration }
    power_calibration: { name: Power Calibration }
    energy_calibration: { name: Energy Calibration }

  # 🌟 修复：移除 object_id，在 name 中加入唯一英文缩写
  - platform: ld2412
    timeout: 
      name: "LD2412 存在超时 (Timeout)"
      id: ld2412_timeout
    min_distance_gate: 
      name: "LD2412 最小距离门 (MinGate)"
      id: ld2412_min_gate
    max_distance_gate: 
      name: "LD2412 最大距离门 (MaxGate)"
      id: ld2412_max_gate
    light_threshold: 
      name: "LD2412 光照阈值 (Thresh)"
      id: ld2412_light_thresh

time:
  - platform: homeassistant
    id: homeassistant_time
    on_time:
      - seconds: 0
        minutes: 0
        hours: 0
        then:
          - lambda: id(var_energy) = id(bl0940_energy).state;

button:
  - platform: bl0940
    name: Reset Calibration
  - platform: factory_reset
    name: Factory Reset
    internal: True
    id: btn_factory_reset
    
  # 🌟 修复：移除 object_id，在 name 中加入唯一英文缩写
  - platform: ld2412
    factory_reset: 
      name: "LD2412 恢复出厂 (Reset)"
      id: ld2412_factory_reset
    restart: 
      name: "LD2412 重启雷达 (Restart)"
      id: ld2412_restart
    query_params: 
      name: "LD2412 查询参数 (Query)"
      id: ld2412_query

text_sensor:
  # 🌟 修复：移除 object_id，在 name 中加入唯一英文缩写
  - platform: ld2412
    version: 
      name: "LD2412 固件版本 (Ver)"
      id: ld2412_version
    mac_address: 
      name: "LD2412 MAC地址 (MAC)"
      id: ld2412_mac
