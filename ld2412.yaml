esphome:
  name: smartoutletv1
  name_add_mac_suffix: true
  comment: 基于ESP32的墙壁智能插座，磁保持继电器+计量+LD2412人体存在。支持OTA与本地网页控制。
  project:
    name: "HA-DIYer.SmarOutlet-V1"
    version: "1.1.4"

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  baud_rate: 0

api:

ota:
  - platform: esphome
  - platform: web_server

web_server:
  port: 80
  version: 3

wifi:
  ap:
    ssid: "SmartOutlet(V1) Hotspot"
    password: "12345678"

captive_portal:

substitutions:
  led_pin: GPIO27
  button_pin: GPIO0
  relay_a_pin: GPIO26
  relay_b_pin: GPIO25
  bl0940_tx_pin: GPIO21
  bl0940_rx_pin: GPIO5

globals:
  - id: var_energy
    type: float
    restore_value: yes
    initial_value: "0"
  - id: current_presence_seconds
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: last_presence_seconds
    type: uint32_t
    restore_value: yes
    initial_value: '0'
  - id: current_absence_seconds
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: last_absence_seconds
    type: uint32_t
    restore_value: yes
    initial_value: '0'

uart:
  - id: uart_bl0940
    tx_pin: GPIO21
    rx_pin: GPIO5
    baud_rate: 4800
    stop_bits: 1

  - id: uart_ld2412
    tx_pin: GPIO1
    rx_pin: GPIO3
    baud_rate: 115200
    parity: NONE
    stop_bits: 1
    rx_buffer_size: 512

ld2412:
  uart_id: uart_ld2412


output:
  - platform: gpio
    id: relay_a_pin_output
    pin: { number: $relay_a_pin, mode: { output: true, pulldown: true } }
  - platform: gpio
    id: relay_b_pin_output
    pin: { number: $relay_b_pin, mode: { output: true, pulldown: true } }

status_led:
  pin:
    number: $led_pin
    inverted: true

switch:
  - platform: template
    name: "Switch"
    id: outlet_switch
    device_class: outlet
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - output.turn_off: relay_a_pin_output
      - output.turn_on: relay_b_pin_output
      - delay: 100ms
      - output.turn_off: relay_b_pin_output
    turn_off_action:
      - output.turn_off: relay_b_pin_output
      - output.turn_on: relay_a_pin_output
      - delay: 100ms
      - output.turn_off: relay_a_pin_output

  - platform: restart
    name: "Restart"
    id: outlet_reset

  - platform: ld2412
    engineering_mode: { name: "LD2412 工程模式 Eng", id: ld2412_eng_mode }
    bluetooth: { name: "LD2412 蓝牙控制 BT", id: ld2412_bluetooth }

binary_sensor:
  - platform: gpio
    pin: { number: $button_pin, inverted: true, mode: { input: true, pullup: true } }
    name: "button"
    internal: true
    on_click:
      - min_length: 50ms
        max_length: 350ms
        then:
          - switch.toggle: outlet_switch
    on_multi_click:
      - timing: [ON for at least 10s]
        then:
          - logger.log: { level: INFO, format: "FACTORY RESET" }
          - button.press: btn_factory_reset

  - platform: ld2412
    has_target:
      name: "LD2412 有人 Target"
      id: ld2412_target
      on_press:
        - lambda: 'id(last_absence_seconds) = id(current_absence_seconds);'
      on_release:
        - lambda: 'id(last_presence_seconds) = id(current_presence_seconds);'
    has_moving_target: { name: "LD2412 微动 Moving", id: ld2412_moving }
    has_still_target: { name: "LD2412 静止 Still", id: ld2412_still }

sensor:
  - platform: bl0940
    uart_id: uart_bl0940
    voltage: { name: 'Voltage', accuracy_decimals: 0 }
    current: { name: 'Current' }
    power: { name: 'Power', accuracy_decimals: 1 }
    energy: { name: 'Energy', accuracy_decimals: 3, id: bl0940_energy }
    read_command: 0x58
    write_command: 0xA8
    legacy_mode: false
    resistor_one: 0.51
    resistor_two: 1950
    update_interval: 1s

  - platform: template
    name: "Total Daily Energy"
    id: bl0940_DailyEnergy
    device_class: energy
    accuracy_decimals: 3
    unit_of_measurement: 'kWh'
    update_interval: 1min
    lambda: |-
      if (isnan(id(var_energy)) || id(var_energy) < 0.001f ||
          id(var_energy) > id(bl0940_energy).state) {
        id(var_energy) = id(bl0940_energy).state;
      }
      return id(bl0940_energy).state - id(var_energy);

  - platform: ld2412
    moving_distance: { name: "LD2412 运动距离 MDist", id: ld2412_moving_dist }
    still_distance: { name: "LD2412 静止距离 SDist", id: ld2412_still_dist }
    moving_energy: { name: "LD2412 运动能量 MEnergy", id: ld2412_moving_energy }
    still_energy: { name: "LD2412 静止能量 SEnergy", id: ld2412_still_energy }
    detection_distance: { name: "LD2412 检测距离 Det", id: ld2412_det_dist }
    light: { name: "LD2412 光照度 Lux", id: ld2412_light }

  - platform: template
    name: "当前有人时长 P_Curr"
    unit_of_measurement: "s"
    accuracy_decimals: 0
    update_interval: 1s
    lambda: 'return id(current_presence_seconds);'

  - platform: template
    name: "上次有人时长 P_Last"
    unit_of_measurement: "s"
    accuracy_decimals: 0
    update_interval: 5s
    lambda: 'return id(last_presence_seconds);'

  - platform: template
    name: "当前无人时长 A_Curr"
    unit_of_measurement: "s"
    accuracy_decimals: 0
    update_interval: 1s
    lambda: 'return id(current_absence_seconds);'

  - platform: template
    name: "上次无人时长 A_Last"
    unit_of_measurement: "s"
    accuracy_decimals: 0
    update_interval: 5s
    lambda: 'return id(last_absence_seconds);'

  - platform: wifi_signal
    name: "WiFi RSSI"
    update_interval: 60s

  - platform: internal_temperature
    name: "ESP32 Chip Temperature"
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    update_interval: 60s

  - platform: uptime
    name: "Uptime"
    id: sensor_uptime
    update_interval: 60s

number:
  - platform: bl0940
    current_calibration: { name: Current Calibration }
    voltage_calibration: { name: Voltage Calibration }
    power_calibration: { name: Power Calibration }
    energy_calibration: { name: Energy Calibration }

  - platform: ld2412
    timeout: { name: "LD2412 存在超时 Timeout", id: ld2412_timeout }
    min_distance_gate: { name: "LD2412 最小距离门 MinGate", id: ld2412_min_gate }
    max_distance_gate: { name: "LD2412 最大距离门 MaxGate", id: ld2412_max_gate }
    light_threshold: { name: "LD2412 光照阈值 Thresh", id: ld2412_light_thresh }

button:
  - platform: bl0940
    name: Reset Calibration
  - platform: factory_reset
    name: Factory Reset
    internal: true
    id: btn_factory_reset
  - platform: ld2412
    factory_reset: { name: "LD2412 恢复出厂 Reset", id: ld2412_factory_reset }
    restart: { name: "LD2412 重启雷达 Restart", id: ld2412_restart }
    query_params: { name: "LD2412 查询参数 Query", id: ld2412_query }

text_sensor:
  - platform: ld2412
    version: { name: "LD2412 固件版本 Ver", id: ld2412_version }
    mac_address: { name: "LD2412 MAC地址 MAC", id: ld2412_mac }

  - platform: version
    name: "ESPHome Version"

  # WiFi 信息
  - platform: wifi_info
    ip_address:
      name: "IP Address"
    ssid:
      name: "Connected SSID"
    bssid:
      name: "Connected BSSID"
    mac_address:
      name: "MAC Address"

  # 开机时长文本
  - platform: template
    name: "Uptime Human"
    id: uptime_human
    update_interval: 60s
    lambda: |-
      uint32_t dur = (uint32_t) id(sensor_uptime).state;
      int days  = dur / 86400;  dur %= 86400;
      int hours = dur / 3600;   dur %= 3600;
      int mins  = dur / 60;
      char buf[32];
      snprintf(buf, sizeof(buf), "%dd %02dh %02dm", days, hours, mins);
      return { std::string(buf) };

time:
  - platform: homeassistant
    id: homeassistant_time
    on_time:
      - hours: 0
        minutes: 0
        seconds: 0
        then:
          - lambda: 'id(var_energy) = id(bl0940_energy).state;'

interval:
  - interval: 1s
    then:
      - if:
          condition:
            binary_sensor.is_on: ld2412_target
          then:
            - lambda: |-
                id(current_presence_seconds)++;
                id(current_absence_seconds) = 0;
          else:
            - lambda: |-
                id(current_absence_seconds)++;
                id(current_presence_seconds) = 0;

  - interval: 5min
    then:
      - if:
          condition:
            lambda: 'return isnan(id(ld2412_det_dist).state);'
          then:
            - logger.log: "LD2412 Restart"
            - button.press: ld2412_restart
