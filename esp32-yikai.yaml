esphome:
  name: yeelight-gateway-v3
  friendly_name: Yeelight Gateway V3

esp32:
  board: esp32dev
  flash_size: 4MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_FREERTOS_UNICORE: y

logger:

api:

ota:
  - platform: esphome

wifi:
  ssid: "CC"
  password: "chen1122"

captive_portal:

web_server:

# ================= BLE 核心配置 =================
esp32_ble:
  io_capability: none
  enable_on_boot: true

esp32_ble_server:
  id: ble_server
  manufacturer_data: []

esp32_ble_tracker:
  scan_parameters:
    interval: 1000ms
    window: 50ms
    active: false
  on_ble_manufacturer_data_advertise:
    - manufacturer_id: "134D"
      then:
        - lambda: |-
            if (x.size() < 20) return;
            if (x[0] != 0x21) return;
            if (x[2]!=0x48 || x[3]!=0x80 || x[4]!=0x27 || x[5]!=0x70 || x[6]!=0x00 || x[7]!=0x00) return;
            
            bool power_on = (x[9] == 0x01);
            bool fan_running = (x[18] & 0x01);
            uint8_t fan_gear_idx = x[19];
            uint16_t brt_raw = (x[14] << 8) | x[15];
            int brt_pct = (brt_raw == 0xFFFF) ? 100 : (int)(brt_raw / 655.35);
            
            id(dev3_power).publish_state(power_on);
            id(dev3_fan_running).publish_state(fan_running);
            id(dev3_fan_speed).publish_state(fan_running ? (fan_gear_idx + 1) : 0);
            id(dev3_brightness).publish_state(brt_pct);

bluetooth_proxy:
  active: true
  cache_services: true

# ================= 全局变量与脚本 =================
globals:
  - id: pkt_1
    type: std::vector<uint8_t>
    initial_value: 'std::vector<uint8_t>{}'
  - id: pkt_2
    type: std::vector<uint8_t>
    initial_value: 'std::vector<uint8_t>{}'
  - id: last_cmd_time
    type: uint32_t
    initial_value: '0'
  - id: do_factory_reset
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: safe_mode_tap_count
    type: int
    restore_value: no
    initial_value: '0'
  - id: key_combination_hold
    type: bool
    restore_value: no
    initial_value: 'false'

script:
  - id: ble_send
    mode: restart
    then:
      - lambda: 'id(ble_server).set_manufacturer_data(id(pkt_1));'
      - delay: 150ms
      - lambda: 'id(ble_server).set_manufacturer_data(id(pkt_2));'
      - delay: 50ms
      - lambda: 'id(ble_server).set_manufacturer_data({});'

# ================= 传感器 =================
sensor:
  - platform: uptime
    name: Uptime

  - platform: template
    name: "Dev3 Fan Speed"
    id: dev3_fan_speed
    unit_of_measurement: "档"
    accuracy_decimals: 0
    icon: mdi:numeric

  - platform: template
    name: "Dev3 Brightness"
    id: dev3_brightness
    unit_of_measurement: "%"
    accuracy_decimals: 0
    icon: mdi:brightness-percent

  - platform: wifi_signal
    name: "WiFi Signal Strength"
    id: wifi_signal_db
    update_interval: 60s

  - platform: copy
    source_id: wifi_signal_db
    name: "WiFi Signal Percent"
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "%"
    icon: mdi:wifi-strength-4

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "ESP IP Address"
    ssid:
      name: "ESP Connected SSID"
    bssid:
      name: "ESP Connected BSSID"

# ================= 输出与灯光 =================
output:
  - platform: gpio
    id: blue_led_out
    pin:
      number: GPIO27
      inverted: true
  - platform: gpio
    id: white_led_out
    pin:
      number: GPIO26
      inverted: true

light:
  - platform: binary
    name: Blue LED
    id: blue_led
    output: blue_led_out
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: binary
    name: White LED
    id: white_led
    output: white_led_out
    restore_mode: RESTORE_DEFAULT_OFF

# ================= 物理按键与虚拟传感器 =================
binary_sensor:
  # 虚拟传感器 (保留原有)
  - platform: template
    name: "Dev3 Light Power"
    id: dev3_power
    device_class: light
    icon: mdi:ceiling-light

  - platform: template
    name: "Dev3 Fan Running"
    id: dev3_fan_running
    device_class: running
    icon: mdi:fan

  # ================= 物理按键 (已修复 restart 动作) =================
  
  # KEY1 GPIO34
  - platform: gpio
    id: key1
    pin: GPIO34
    name: KEY1
    on_multi_click:
      # 长按 8s (组合键检测)
      - timing:
          - ON for at least 8s
        then:
          - lambda: 'id(key_combination_hold) = true;'
          - delay: 100ms
          - if:
              condition:
                binary_sensor.is_on: key4
              then:
                - logger.log: "KEY1+KEY4 长按8秒，准备恢复出厂"
                - lambda: 'id(do_factory_reset) = true;'
                - esp32.restart:  # <--- 修复点：改为 esp32.restart
              else:
                - logger.log: "仅KEY1长按，无复位"
                - lambda: 'id(key_combination_hold) = false;'
      # 单击
      - timing:
          - ON for at most 0.5s
          - OFF for at least 0.3s
        then:
          - logger.log: "KEY1 单击"
          - homeassistant.event:
              event: gateway_key
              data:
                key: "key1"
                mode: "single"
      # 双击
      - timing:
          - ON for at most 0.5s
          - OFF for at most 0.3s
          - ON for at most 0.5s
          - OFF for at least 0.3s
        then:
          - logger.log: "KEY1 双击"
          - homeassistant.event:
              event: gateway_key
              data:
                key: "key1"
                mode: "double"

  # KEY2 GPIO35
  - platform: gpio
    id: key2
    pin: GPIO35
    name: KEY2
    on_multi_click:
      # 长按 1.5s
      - timing:
          - ON for at least 1.5s
        then:
          - logger.log: "KEY2 长按"
          - homeassistant.event:
              event: gateway_key
              data:
                key: "key2"
                mode: "long"
      # 单击 (安全模式计数)
      - timing:
          - ON for at most 0.5s
          - OFF for at least 0.3s
        then:
          - logger.log: "KEY2 单击"
          - homeassistant.event:
              event: gateway_key
              data:
                key: "key2"
                mode: "single"
          - lambda: 'id(safe_mode_tap_count)++;'
          - if:
              condition:
                lambda: 'id(safe_mode_tap_count) >= 5'
              then:
                - logger.log: "KEY2连续5次，准备重启进入安全模式"
                - lambda: 'id(safe_mode_tap_count) = 0;'
                - repeat:
                    count: 8
                    then:
                      - light.toggle: blue_led
                      - delay: 150ms
                # <--- 修复点：改为 esp32.restart
                - esp32.restart: 
              else:
                - delay: 5000ms
                - if:
                    condition:
                      lambda: 'id(safe_mode_tap_count) < 5'
                    then:
                      - lambda: 'id(safe_mode_tap_count) = 0;'
      # 双击
      - timing:
          - ON for at most 0.5s
          - OFF for at most 0.3s
          - ON for at most 0.5s
          - OFF for at least 0.3s
        then:
          - logger.log: "KEY2 双击"
          - homeassistant.event:
              event: gateway_key
              data:
                key: "key2"
                mode: "double"

  # KEY3 GPIO32
  - platform: gpio
    id: key3
    pin: GPIO32
    name: KEY3
    on_multi_click:
      # 长按 1.5s
      - timing:
          - ON for at least 1.5s
        then:
          - logger.log: "KEY3 长按"
          - homeassistant.event:
              event: gateway_key
              data:
                key: "key3"
                mode: "long"
      # 单击
      - timing:
          - ON for at most 0.5s
          - OFF for at least 0.3s
        then:
          - logger.log: "KEY3 单击"
          - homeassistant.event:
              event: gateway_key
              data:
                key: "key3"
                mode: "single"
      # 双击
      - timing:
          - ON for at most 0.5s
          - OFF for at most 0.3s
          - ON for at most 0.5s
          - OFF for at least 0.3s
        then:
          - logger.log: "KEY3 双击"
          - homeassistant.event:
              event: gateway_key
              data:
                key: "key3"
                mode: "double"

  # KEY4 GPIO33
  - platform: gpio
    id: key4
    pin: GPIO33
    name: KEY4
    on_multi_click:
      # 长按 1.5s
      - timing:
          - ON for at least 1.5s
        then:
          - logger.log: "KEY4 长按"
          - homeassistant.event:
              event: gateway_key
              data:
                key: "key4"
                mode: "long"
      # 单击
      - timing:
          - ON for at most 0.5s
          - OFF for at least 0.3s
        then:
          - logger.log: "KEY4 单击"
          - homeassistant.event:
              event: gateway_key
              data:
                key: "key4"
                mode: "single"
      # 双击
      - timing:
          - ON for at most 0.5s
          - OFF for at most 0.3s
          - ON for at most 0.5s
          - OFF for at least 0.3s
        then:
          - logger.log: "KEY4 双击"
          - homeassistant.event:
              event: gateway_key
              data:
                key: "key4"
                mode: "double"

