esphome:
  name: esp32-single-core-proxy
  friendly_name: ESP32 Single Core Proxy
  min_version: "2023.8.0" 

esp32:
  board: esp32dev
  framework:
    type: esp-idf

# 1. Wi-Fi 配置
wifi:
  ssid: "你的WiFi名称"
  password: "你的WiFi密码"
  
  ap:
    ssid: "ESP32 Fallback"
    password: "fallback123"

captive_portal:

# 2. 本地 API (已关闭加密，避免报错并节省单核资源)
api:

# 3. HTTP OTA 升级配置
ota:
  - platform: esphome
    password: "你的OTA升级密码" 

web_server:
  port: 80

# 4. 蓝牙代理配置
esp32_ble_tracker:
  scan_parameters:
    interval: 320ms
    window: 30ms
    active: true

bluetooth_proxy:
  active: true

logger:
  level: INFO
