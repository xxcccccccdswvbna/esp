esphome:
  name: midea-dual-control
  friendly_name: Midea Dual Control
  on_boot:
    - priority: 600
      then:
        - delay: 2s  # ✅ 让射频初始化完成

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      # ✅ 保留：动态分配蓝牙内存，避免初始化失败
      CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"
      
      # ✅ 保留：提高系统实时性
      CONFIG_FREERTOS_HZ: "1000"
      
      # ✅ 保留：限制蓝牙连接数，节省内存
      CONFIG_BT_ACL_CONNECTIONS: "3"
      

logger:
  level: INFO  # ✅ 改为 INFO，避免日志阻塞
  logs:
    esp32_ble: WARN
    esp32_ble_tracker: WARN
    midea_ble: INFO  # ✅ 仅保留关键业务日志

api:
  encryption:
    key: "4jGVSQw9/v+e8QCB/CSQIwGFcWS3Opo4oHSRbkq41RI="
  reboot_timeout: 1h

ota:
  platform: esphome
  password: "chen1122"

wifi:
  ssid: "CC"
  password: "chen1122"
  power_save_mode: none  # ✅ 必须为 none，避免休眠暂停蓝牙

# ❌ 移除 bluetooth_proxy（与本地扫描冲突）
# bluetooth_proxy:
#   active: true

esp32_ble:
  io_capability: none

esp32_ble_server:
  id: ble_server
  manufacturer_data: []

# ========== 全局变量 ==========
globals:
  - id: last_cmd_time
    type: uint32_t
    initial_value: '0'
  - id: cmd_pkt
    type: std::vector<uint8_t>
    initial_value: 'std::vector<uint8_t>{}'
  - id: end_pkt
    type: std::vector<uint8_t>
    initial_value: 'std::vector<uint8_t>{}'
  - id: is_sending
    type: bool
    initial_value: 'false'

# ========== 清空广播脚本 ==========
script:
  - id: clear_broadcast
    then:
      - delay: 500ms
      - lambda: |-
          std::vector<uint8_t> empty(26, 0x00);
          id(ble_server).set_manufacturer_data(empty);
      - delay: 500ms
      - globals.set: {id: is_sending, value: 'false'}

# ========== 控制实体 (Dev1/Dev2) - 完全保留 ==========
# 🟦 Dev1 亮度/色温/风扇 + 🟧 Dev2 亮度/色温/风扇 + 按钮
# ← 此处完全复用你原有的 number/select/button 配置，无需修改
# （为节省篇幅省略，实际使用时请保留原控制代码）

# ========== ✅ 优化版 Dev3 状态监听 (本地扫描) ==========
# ========== 替换你当前的 esp32_ble_tracker ==========
# ========== ✅ 修正版 Dev3 状态监听 ==========
esp32_ble_tracker:
  scan_parameters:
    interval: 1000ms    # ✅ 宽松间隔，避免与 WiFi 冲突
    window: 500ms
    active: false       # ✅ 被动扫描，稳定优先
    continuous: true
  on_ble_manufacturer_data_advertise:
    - manufacturer_id: "134D"
      then:
        - lambda: |-
            if (x.size() < 20) return;
            if (x[0] != 0x21) return;  // 协议头过滤
            
            // MAC 过滤: 00:00:70:27:80:48 → 广播反向: 48 80 27 70 00 00
            if (x[2]!=0x48 || x[3]!=0x80 || x[4]!=0x27 || x[5]!=0x70 || x[6]!=0x00 || x[7]!=0x00) return;
            
            // 解析字段
            bool power_on = (x[9] == 0x01);
            bool fan_running = (x[18] & 0x01);
            uint8_t fan_gear_idx = x[19];
            uint16_t brt_raw = (x[14] << 8) | x[15];
            
            // 发布到 HA
            id(dev3_power).publish_state(power_on);
            id(dev3_fan_running).publish_state(fan_running);
            id(dev3_fan_speed).publish_state(fan_running ? (fan_gear_idx + 1) : 0);
            id(dev3_brightness).publish_state(brt_raw == 0xFFFF ? 100 : (int)(brt_raw / 655.35));
            
            ESP_LOGI("Dev3_State", "Power=%d Fan=%d(Idx%d) BRT=%d%%", 
                     power_on, fan_running, fan_gear_idx, (brt_raw==0xFFFF?100:(int)(brt_raw/655.35)));
            # ← 注意：这里不要加 }，lambda 通过缩进自动结束

# ========== Dev3 状态实体 ==========
binary_sensor:
  - platform: template
    name: "Dev3 Light Power"
    id: dev3_power
    device_class: light
    icon: mdi:ceiling-light
  - platform: template
    name: "Dev3 Fan Running"
    id: dev3_fan_running
    device_class: running
    icon: mdi:fan

sensor:
  - platform: template
    name: "Dev3 Fan Speed"
    id: dev3_fan_speed
    unit_of_measurement: "档"
    accuracy_decimals: 0
    icon: mdi:numeric
  - platform: template
    name: "Dev3 Brightness"
    id: dev3_brightness
    unit_of_measurement: "%"
    accuracy_decimals: 0
    icon: mdi:brightness-percent

# ========== 网络看门狗 ==========
interval:
  - interval: 60s
    then:
      - lambda: |-
          static uint32_t last_ok = 0;
          if (network::is_connected()) {
            last_ok = millis();
          } else if (millis() - last_ok > 180000) {
            ESP_LOGW("Watchdog", "Network lost >3min, rebooting...");
            delay(100);
            App.reboot();
          }
