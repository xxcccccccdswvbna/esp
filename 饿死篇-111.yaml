# ==============================================================================
# Yeelight Gateway V4 PRO 正式稳定版
# 硬件：ESP32-WROOM-32D 单核ESP-IDF
# GPIO分配
# KEY1 GPIO34 | KEY2 GPIO35 | KEY3 GPIO32 | KEY4 GPIO33
# BLUE_LED GPIO27 | WHITE_LED GPIO26
# 功能：BLE Tracker、蓝牙代理、4键单击/双击/长按、状态指示灯、组合键出厂复位、5次短按安全模式、OTA、Web面板、WiFi信号/运行时长
# 修复：组合复位、安全模式计数不会被跳过，灯光状态互斥锁
# ==============================================================================
esphome:
  name: yeelight-gateway-v4
  friendly_name: Yeelight Gateway V4 PRO
  comment: "V4长期稳定固件，单核IDF，修复按键触发跳过问题"
  on_boot:
    priority: -100
    then:
      - light.turn_off: blue_led
      - light.turn_off: white_led
      - if:
          condition:
            lambda: 'return id(do_factory_reset);'
          then:
            - logger.log: "执行出厂恢复，清空配置"
            - repeat:
                count: 5
                then:
                  - light.toggle: white_led
                  - delay: 300ms
            - factory_reset:

esp32:
  board: esp32dev
  flash_size: 4MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_FREERTOS_UNICORE: y
      CONFIG_BT_NIMBLE_TASK_STACK_SIZE: 3072
      CONFIG_BT_SCAN_RESULT_QUEUE_LEN: 24

# 日志优化，减少单核资源占用
logger:
  level: INFO
  baud_rate: 115200
  logs:
    esp32_ble_tracker: WARN
    bluetooth_proxy: INFO

# Home Assistant API
api:
  encryption:
    key: "自行替换加密密钥"
  reboot_timeout: 15min

# OTA升级配置
ota:
  platform: esphome
  password: "gateway_v4_ota_secure"
  on_begin:
    then:
      - light.blink:
          id: white_led
          period: 150ms
  on_end:
    then:
      - light.turn_off: white_led
  on_error:
    then:
      - repeat:
          count: 10
          then:
            - light.toggle: white_led
            - delay: 100ms
      - light.turn_off: white_led

# WiFi配置
wifi:
  ssid: "CC"
  password: "chen1122"
  fast_connect: true
  power_save: none
  domain: ".local"
  on_disconnect:
    then:
      - light.blink:
          id: blue_led
          period: 1000ms
  on_connect:
    then:
      - light.turn_on: blue_led

captive_portal:

# Web管理面板
web_server:
  port: 80
  auth:
    username: admin
    password: gateway_v4_web

# BLE扫描优化
esp32_ble_tracker:
  scan_parameters:
    interval: 1100ms
    window: 300ms
    active: true

# HA蓝牙代理
bluetooth_proxy:
  active: true
  cache_services: true
  on_connected:
    then:
      - light.turn_on: blue_led
  on_disconnected:
    then:
      - light.blink:
          id: blue_led
          period: 1000ms

# 传感器
sensor:
  - platform: uptime
    name: Uptime
    update_interval: 60s
  - platform: wifi_signal
    name: WiFi RSSI
    update_interval: 30s

text_sensor:
  - platform: wifi_info
    ip_address:
      name: Device IP
    ssid:
      name: Connected SSID
  - platform: version
    name: Firmware Version

# LED硬件输出
output:
  - platform: gpio
    id: blue_led_out
    pin:
      number: GPIO27
      inverted: true
  - platform: gpio
    id: white_led_out
    pin:
      number: GPIO26
      inverted: true

light:
  - platform: binary
    name: Blue LED
    id: blue_led
    output: blue_led_out
    restore_mode: RESTORE_DEFAULT_OFF
  - platform: binary
    name: White LED
    id: white_led
    output: white_led_out
    restore_mode: RESTORE_DEFAULT_OFF

# 全局变量
globals:
  # 出厂复位标记
  - id: do_factory_reset
    type: bool
    restore_value: no
    initial_value: 'false'
  # 安全模式按键计数，无自动清零延时
  - id: safe_mode_tap_count
    type: int
    restore_value: no
    initial_value: '0'
  # 组合键长按计时标记
  - id: key_combination_hold
    type: bool
    restore_value: no
    initial_value: 'false'

# 按键定义 修复跳过触发问题
binary_sensor:
  # KEY1 GPIO34
  - platform: gpio
    id: key1
    pin: GPIO34
    name: KEY1
    on_multi_click:
      - timing:
          max_time_between_clicks: 500ms
        # 单击
        single:
          then:
            - logger.log: "KEY1 单击"
            - homeassistant.event:
                event: gateway_key
                data:
                  key: "key1"
                  mode: "single"
        # 双击
        double:
          then:
            - logger.log: "KEY1 双击"
            - homeassistant.event:
                event: gateway_key
                data:
                  key: "key1"
                  mode: "double"
    on_long_press:
      min_length: 8s
      then:
        # 长按8s时检测KEY4是否同时按下，触发复位
        - lambda: 'id(key_combination_hold) = true;'
        - delay: 100ms
        - if:
            condition:
              binary_sensor.is_on: key4
            then:
              - logger.log: "KEY1+KEY4 长按8秒，准备恢复出厂"
              - lambda: 'id(do_factory_reset) = true;'
              - restart:
            else:
              - logger.log: "仅KEY1长按，无复位"
              - lambda: 'id(key_combination_hold) = false;'
    on_release:
      then:
        - lambda: 'id(key_combination_hold) = false;'

  # KEY2 GPIO35 安全模式计数修复，不会自动清零跳过
  - platform: gpio
    id: key2
    pin: GPIO35
    name: KEY2
    on_multi_click:
      - timing:
          max_time_between_clicks: 600ms
        single:
          then:
            - logger.log: "KEY2 单击"
            - homeassistant.event:
                event: gateway_key
                data:
                  key: "key2"
                  mode: "single"
            # 计数累加，无延时自动清零
            - lambda: 'id(safe_mode_tap_count)++;'
            - if:
                condition:
                  lambda: 'id(safe_mode_tap_count) >= 5'
                then:
                  - logger.log: "KEY2连续5次，进入安全模式"
                  - safe_mode.start:
                  - lambda: 'id(safe_mode_tap_count) = 0;'
                  # 安全模式灯光提示
                  - repeat:
                      count: 8
                      then:
                        - light.toggle: blue_led
                        - delay: 150ms
                else:
                  # 超时5秒未继续按再清零，避免快速连按被跳过
                  - delay: 5000ms
                  - if:
                      condition:
                        lambda: 'id(safe_mode_tap_count) <5'
                      then:
                        - lambda: 'id(safe_mode_tap_count) = 0;'
        double:
          then:
            - logger.log: "KEY2 双击"
            - homeassistant.event:
                event: gateway_key
                data:
                  key: "key2"
                  mode: "double"
    on_long_press:
      min_length: 1.5s
      then:
        - logger.log: "KEY2 长按"
        - homeassistant.event:
            event: gateway_key
            data:
              key: "key2"
              mode: "long"

  # KEY3 GPIO32
  - platform: gpio
    id: key3
    pin: GPIO32
    name: KEY3
    on_multi_click:
      - timing:
          max_time_between_clicks: 500ms
        single:
          then:
            - logger.log: "KEY3 单击"
            - homeassistant.event:
                event: gateway_key
                data:
                  key: "key3"
                  mode: "single"
        double:
          then:
            - logger.log: "KEY3 双击"
            - homeassistant.event:
                event: gateway_key
                data:
                  key: "key3"
                  mode: "double"
    on_long_press:
      min_length: 1.5s
      then:
        - logger.log: "KEY3 长按"
        - homeassistant.event:
            event: gateway_key
            data:
              key: "key3"
              mode: "long"

  # KEY4 GPIO33
  - platform: gpio
    id: key4
    pin: GPIO33
    name: KEY4
    on_multi_click:
      - timing:
          max_time_between_clicks: 500ms
        single:
          then:
            - logger.log: "KEY4 单击"
            - homeassistant.event:
                event: gateway_key
                data:
                  key: "key4"
                  mode: "single"
        double:
          then:
            - logger.log: "KEY4 双击"
            - homeassistant.event:
                event: gateway_key
                data:
                  key: "key4"
                  mode: "double"
    on_long_press:
      min_length: 1.5s
      then:
        - logger.log: "KEY4 长按"
        - homeassistant.event:
            event: gateway_key
            data:
              key: "key4"
              mode: "long"

# 系统控制按钮
button:
  - platform: restart
    name: Restart Gateway
  - platform: factory_reset
    name: Factory Reset Gateway
