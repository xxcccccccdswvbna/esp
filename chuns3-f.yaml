esphome:
  name: midea-control-tx
  friendly_name: Midea Control TX

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"
      CONFIG_FREERTOS_HZ: "1000"

logger:
  level: INFO

api:
  encryption:
    key: "4jGVSQw9/v+e8QCB/CSQIwGFcWS3Opo4oHSRbkq41RI="

ota:
  platform: esphome
  password: "chen1122"

wifi:
  ssid: "CC"
  password: "chen1122"
  power_save_mode: none

# 蓝牙发射必需组件
esp32_ble:
  io_capability: none

esp32_ble_server:
  id: ble_server
  manufacturer_data: []

# 全局变量（防冲突）
globals:
  - id: last_cmd_time
    type: uint32_t
    initial_value: '0'
  - id: cmd_pkt
    type: std::vector<uint8_t>
    initial_value: 'std::vector<uint8_t>{}'
  - id: end_pkt
    type: std::vector<uint8_t>
    initial_value: 'std::vector<uint8_t>{}'

# 清空广播脚本
script:
  - id: clear_broadcast
    then:
      - delay: 300ms
      - lambda: |-
          id(ble_server).set_manufacturer_data({});

