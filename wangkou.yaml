esphome:
  name: c6-eth-gateway
  friendly_name: "C6 Ethernet Gateway"

esp32:
  board: esp32-c6-devkitc-1
  framework:
    type: esp-idf

ethernet:
  type: W5500
  clk_pin: GPIO19
  mosi_pin: GPIO18
  miso_pin: GPIO20
  cs_pin: GPIO21
  interrupt_pin: GPIO22
  reset_pin: GPIO15     # 备选：有些板子 RST 接 GPIO15
  clock_speed: 8MHz     # 进一步降速
api:
  encryption:
    key: "4jGVSQw9/v+e8QCB/CSQIwGFcWS3Opo4oHSRbkq41RI="

ota:
  - platform: esphome
    password: "chen1122"

web_server:
  port: 80
  version: 2

logger:
  level: INFO  # 恢复默认，避免日志阻塞网络栈

binary_sensor:
  - platform: status
    name: "Ethernet Status"

text_sensor:
  - platform: ethernet_info
    ip_address:
      name: "Ethernet IP"
