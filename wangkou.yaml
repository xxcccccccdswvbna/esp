esphome:
  name: c6-eth-gateway
  friendly_name: "C6 Ethernet Gateway"

esp32:
  board: esp32-c6-devkitc-1
  framework:
    type: esp-idf

ethernet:
  type: W5500
  clk_pin: GPIO19       # SCK
  mosi_pin: GPIO18      # MOSI
  miso_pin: GPIO20      # MISO
  cs_pin: GPIO21        # ⚠️ 关键修正：从 23 改为 21
  interrupt_pin: GPIO22 # INT
  reset_pin: GPIO5      # ⚠️ 关键新增：W5500 必须复位，通常为 GPIO5
  clock_speed: 10MHz    # ⚠️ 关键新增：降低 SPI 速率，防通信失败
api:
  encryption:
    key: "4jGVSQw9/v+e8QCB/CSQIwGFcWS3Opo4oHSRbkq41RI="

ota:
  - platform: esphome
    password: "chen1122"

web_server:
  port: 80
  version: 2

logger:
  level: INFO  # 恢复默认，避免日志阻塞网络栈

binary_sensor:
  - platform: status
    name: "Ethernet Status"

text_sensor:
  - platform: ethernet_info
    ip_address:
      name: "Ethernet IP"
