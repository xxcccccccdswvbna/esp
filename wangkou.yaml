esphome:
  on_boot:
    priority: 800  # ⚠️ 必须 ≥800，确保在 ethernet(priority 600) 之前执行
    then:
      - output.turn_on: eth_power

output:
  - platform: gpio
    id: eth_power
    pin: GPIO15  # 替换为实际控制脚

ethernet:
  type: W5500
  clk_pin: GPIO19
  mosi_pin: GPIO18
  miso_pin: GPIO20
  cs_pin: GPIO21
