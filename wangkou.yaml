esp32:
  board: esp32-c6-devkitc-1
  framework:
    type: esp-idf
  platformio_options:
    board_build.flash_mode: dio
    # 强制使用 SPI3（部分 C6 载板设计）
    build_flags:
      - -DCONFIG_ETH_SPI_ETHERNET_USE_SPI3=y

ethernet:
  type: W5500
  clk_pin: GPIO19
  mosi_pin: GPIO18
  miso_pin: GPIO20
  cs_pin: GPIO21
  interrupt_pin: GPIO22
  reset_pin: GPIO23
  clock_speed: 5MHz
