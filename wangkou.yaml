esphome:
  name: c6-eth-gateway
  friendly_name: "C6 Ethernet Gateway"

esp32:
  board: esp32-c6-devkitc-1
  framework:
    type: esp-idf

ethernet:
  type: W5500
  clk_pin: GPIO19       # SCK - 通过 R61/R64
  mosi_pin: GPIO18      # MOSI - 通过 R59/R61
  miso_pin: GPIO20      # MISO - 通过 R59
  cs_pin: GPIO21        # CS - 通过 R63（关键修正！）
  interrupt_pin: GPIO22 # INT - 通过 R55/R56
  reset_pin: GPIO23     # RST - 通过 R65（关键新增！）
  clock_speed: 10MHz    # 降低速率
api:
  encryption:
    key: "4jGVSQw9/v+e8QCB/CSQIwGFcWS3Opo4oHSRbkq41RI="

ota:
  - platform: esphome
    password: "chen1122"

web_server:
  port: 80
  version: 2

logger:
  level: INFO  # 恢复默认，避免日志阻塞网络栈

binary_sensor:
  - platform: status
    name: "Ethernet Status"

text_sensor:
  - platform: ethernet_info
    ip_address:
      name: "Ethernet IP"
