esphome:
  name: ee
  friendly_name: EE

esp8266:
  board: esp01_1m
  restore_from_flash: true

logger:
  baud_rate: 0

api:

ota:
  - platform: esphome
    password: "chen1122"

  - platform: web_server

wifi:
  ssid: "CC"
  password: "chen1122"

  reboot_timeout: 0s

  ap:
    ssid: "EE-Setup"
    password: "12345678"

captive_portal:

web_server:
  port: 80

binary_sensor:
  - platform: gpio
    name: "button"
    internal: true

    pin:
      number: GPIO14
      mode: INPUT_PULLUP

    filters:
      - invert:
      - delayed_on: 50ms
      - delayed_off: 50ms

    on_press:
      - switch.toggle: relay

switch:
  - platform: gpio
    id: relay
    name: "kaiguan001"

    pin: GPIO15

    on_turn_on:
      - switch.turn_on: light

    on_turn_off:
      - switch.turn_off: light

  - platform: gpio
    id: light
    internal: true

    pin: GPIO12
    inverted: true

status_led:
  pin: GPIO13
