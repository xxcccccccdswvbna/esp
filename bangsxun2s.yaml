esphome:
  name: ee-test
  friendly_name: EE-Test

esp8266:
  board: esp01_1m
  restore_from_flash: true

logger:
  baud_rate: 0

api:

ota:
  - platform: esphome
    password: "chen1122"

wifi:
  ssid: "CC"
  password: "chen1122"

  min_auth_mode: WPA2

  ap:
    ssid: "EE-Test"
    password: "12345678"

captive_portal:

web_server:
  port: 80
  version: 3

binary_sensor:
  - platform: gpio
    name: "按键"

    pin:
      number: GPIO14
      mode: INPUT_PULLUP

    filters:
      - invert:

switch:
  # 原继电器
  - platform: gpio
    id: relay
    name: "继电器"

    pin: GPIO15

  # 测试GPIO2
  - platform: gpio
    id: test_gpio2
    name: "GPIO2测试"

    pin: GPIO2

  # 测试GPIO16
  - platform: gpio
    id: test_gpio16
    name: "GPIO16测试"

    pin: GPIO16

button:
  - platform: restart
    name: "重启设备"

sensor:
  - platform: wifi_signal
    name: "WiFi信号"
    update_interval: 60s

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP地址"
