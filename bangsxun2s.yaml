esphome:
  name: ee
  friendly_name: EE

esp8266:
  board: esp01_1m
  restore_from_flash: true

logger:
  baud_rate: 0

api:

ota:
  - platform: esphome
    password: "chen1122"

wifi:
  ssid: "CC"
  password: "chen1122"

  min_auth_mode: WPA2
  reboot_timeout: 0s

  ap:
    ssid: "EE-Setup"
    password: "12345678"

captive_portal:

web_server:
  port: 80
  version: 3

copy:

time:
  - platform: sntp
    id: sntp_time
    timezone: Asia/Shanghai

    on_time:
      - seconds: 0
        minutes: /1
        then:
          - script.execute: timer_control

binary_sensor:
  - platform: gpio
    id: button_input
    internal: true

    pin:
      number: GPIO14
      mode: INPUT_PULLUP

    filters:
      - invert:
      - delayed_on: 50ms
      - delayed_off: 50ms

    on_press:
      - switch.toggle: relay

switch:
  - platform: gpio
    id: relay
    name: "插座开关_Relay"

    pin: GPIO15

    on_turn_on:
      - switch.turn_on: relay_led

    on_turn_off:
      - switch.turn_off: relay_led

  - platform: gpio
    id: relay_led
    internal: true

    pin:
      number: GPIO12
      inverted: true

  - platform: gpio
    id: wifi_led
    name: "WiFi状态灯_WiFiLED"

    pin:
      number: GPIO13
      inverted: true

    restore_mode: RESTORE_DEFAULT_ON

  - platform: template
    id: timer_enable
    name: "定时启用_Timer"
    optimistic: true

number:
  - platform: template
    id: start_hour
    name: "开始小时_StartHour"

    min_value: 0
    max_value: 23
    step: 1

    optimistic: true
    restore_value: true
    initial_value: 23

  - platform: template
    id: start_minute
    name: "开始分钟_StartMinute"

    min_value: 0
    max_value: 59
    step: 1

    optimistic: true
    restore_value: true
    initial_value: 0

  - platform: template
    id: end_hour
    name: "结束小时_EndHour"

    min_value: 0
    max_value: 23
    step: 1

    optimistic: true
    restore_value: true
    initial_value: 7

  - platform: template
    id: end_minute
    name: "结束分钟_EndMinute"

    min_value: 0
    max_value: 59
    step: 1

    optimistic: true
    restore_value: true
    initial_value: 0

sensor:
  - platform: wifi_signal
    id: wifi_db
    name: "WiFi信号_WiFiSignal"

    unit_of_measurement: "dBm"
    update_interval: 60s

  - platform: copy
    source_id: wifi_db
    name: "WiFi质量_WiFiQuality"

    unit_of_measurement: "%"
    accuracy_decimals: 0

    filters:
      - lambda: |-
          if (x <= -100) return 0;
          if (x >= -50) return 100;
          return 2 * (x + 100);

  - platform: uptime
    id: uptime_sensor
    name: "运行秒数_UptimeSeconds"

  - platform: template
    name: "剩余内存_FreeHeap"

    unit_of_measurement: "B"
    accuracy_decimals: 0

    lambda: |-
      return ESP.getFreeHeap();

    update_interval: 60s

text_sensor:
  - platform: wifi_info

    ip_address:
      name: "IP地址_IP"

    ssid:
      name: "WiFi名称_SSID"

    mac_address:
      name: "MAC地址_MAC"

  - platform: version
    name: "ESPHome版本_Version"

  - platform: template
    name: "运行时间_Uptime"

    lambda: |-
      uint32_t s = (uint32_t) id(uptime_sensor).state;

      uint32_t d = s / 86400;
      uint32_t h = (s % 86400) / 3600;
      uint32_t m = (s % 3600) / 60;

      char buf[32];
      sprintf(buf, "%ud %uh %um", d, h, m);

      return std::string(buf);

    update_interval: 60s

script:
  - id: timer_control
    mode: restart

    then:
      - lambda: |-
          if (!id(timer_enable).state)
            return;

          auto now = id(sntp_time).now();

          if (!now.is_valid())
            return;

          int cur = now.hour * 60 + now.minute;

          int start =
            (int) id(start_hour).state * 60 +
            (int) id(start_minute).state;

          int end =
            (int) id(end_hour).state * 60 +
            (int) id(end_minute).state;

          bool should_on;

          if (start < end) {
            should_on = (cur >= start && cur < end);
          } else {
            should_on = (cur >= start || cur < end);
          }

          if (should_on) {
            if (!id(relay).state)
              id(relay).turn_on();
          } else {
            if (id(relay).state)
              id(relay).turn_off();
          }

button:
  - platform: restart
    name: "重启设备_Restart"
