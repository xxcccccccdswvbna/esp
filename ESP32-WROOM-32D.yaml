substitutions:
  test_gpio: "2"

esphome:
  name: yeelight-led-test
  friendly_name: Yeelight LED Test

esp32:
  board: esp32dev
  flash_size: 4MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_FREERTOS_UNICORE: y

logger:
  level: VERY_VERBOSE


wifi:
  ssid: "CC"
  password: "chen1122"

web_server:

captive_portal:

sensor:
  - platform: uptime
    name: Uptime

text_sensor:
  - platform: wifi_info
    ip_address:
      name: IP

# 已确认的四个按键
binary_sensor:
  - platform: gpio
    pin: GPIO34
    name: KEY1
    on_press:
      - logger.log: "KEY1"

  - platform: gpio
    pin: GPIO35
    name: KEY2
    on_press:
      - logger.log: "KEY2"

  - platform: gpio
    pin: GPIO32
    name: KEY3
    on_press:
      - logger.log: "KEY3"

  - platform: gpio
    pin: GPIO33
    name: KEY4
    on_press:
      - logger.log: "KEY4"

output:
  - platform: gpio
    id: test_output
    pin:
      number: GPIO${test_gpio}

switch:
  - platform: output
    name: GPIO ${test_gpio}
    output: test_output

button:
  - platform: template
    name: 测试GPIO
    on_press:
      - logger.log: "========== START TEST =========="
      - output.turn_on: test_output
      - delay: 1s
      - output.turn_off: test_output
      - delay: 300ms
      - output.turn_on: test_output
      - delay: 300ms
      - output.turn_off: test_output
      - delay: 300ms
      - output.turn_on: test_output
      - delay: 300ms
      - output.turn_off: test_output
      - logger.log: "========== END TEST =========="

  - platform: restart
    name: Restart
