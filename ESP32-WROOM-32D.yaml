esphome:
  name: ct1
  friendly_name: CT1 Lite
  
  # 修复 eFuse MAC 损坏导致的底层崩溃
  on_boot:
    priority: 1000.0
    then:
      - lambda: |-
          extern "C" esp_err_t esp_base_mac_addr_set(const uint8_t *mac);
          uint8_t custom_mac[6] = {0xAA, 0xBB, 0xCC, 0xDD, 0xEE, 0xFF};
          esp_base_mac_addr_set(custom_mac);

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_FREERTOS_UNICORE: y
      CONFIG_BT_NIMBLE_ENABLED: y
      CONFIG_BT_CLASSIC_ENABLED: n

logger:
  level: WARN
  baud_rate: 115200

wifi:
  ssid: "CC"
  password: "chen1122"
  power_save_mode: LIGHT

# 🚨 开启网页服务 (满足你的需求，但极度消耗内存)
web_server:
  port: 80
  # 注意：坚决不要加 captive_portal，否则必崩！

api:
  reboot_timeout: 0s

ota:
  - platform: esphome

# 蓝牙代理
esp32_ble_tracker:
  scan_parameters:
    interval: 320ms
    window: 30ms
    active: false

bluetooth_proxy:

# 只保留最基础的传感器，绝对不要加之前的几十个 template 传感器！
sensor:
  - platform: uptime
    name: "Uptime"
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
