          - homeassistant.event:
              event: esphome.gateway_key
              data:
                key: "key3"
                mode: "long"
      - timing:
          - ON for at most 0.5s
          - OFF for at most 0.3s
          - ON for at most 0.5s
          - OFF for at least 0.3s
        then:
          - light.turn_on: blue_led
          - delay: 200ms
          - light.turn_off: blue_led
          - homeassistant.event:
              event: esphome.gateway_key
              data:
                key: "key3"
                mode: "double"
      - timing:
          - ON for at most 0.5s
          - OFF for at least 0.3s
        then:
          - light.turn_on: blue_led
          - delay: 200ms
          - light.turn_off: blue_led
          - homeassistant.event:
              event: esphome.gateway_key
              data:
                key: "key3"
                mode: "single"

  # KEY4 GPIO33
  - platform: gpio
    id: key4
    name: "KEY4"
    pin:
      number: GPIO33
      inverted: true
    filters:
      - delayed_on: 20ms
      - delayed_off: 20ms
    on_multi_click:
      - timing:
          - ON for at least 1.5s
        then:
          - light.turn_on: blue_led
          - delay: 200ms
          - light.turn_off: blue_led
          - homeassistant.event:
              event: esphome.gateway_key
              data:
                key: "key4"
                mode: "long"
      - timing:
          - ON for at most 0.5s
          - OFF for at most 0.3s
          - ON for at most 0.5s
          - OFF for at least 0.3s
        then:
          - light.turn_on: blue_led
          - delay: 200ms
          - light.turn_off: blue_led
          - homeassistant.event:
              event: esphome.gateway_key
              data:
                key: "key4"
                mode: "double"
      - timing:
          - ON for at most 0.5s
          - OFF for at least 0.3s
        then:
          - light.turn_on: blue_led
          - delay: 200ms
          - light.turn_off: blue_led
          - homeassistant.event:
              event: esphome.gateway_key
              data:
                key: "key4"
                mode: "single"
