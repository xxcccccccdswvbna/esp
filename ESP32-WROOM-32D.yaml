esphome:
  name: ct1
  friendly_name: CT1 Lite

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_FREERTOS_UNICORE: y
      CONFIG_BT_NIMBLE_ENABLED: n
      CONFIG_BT_CLASSIC_ENABLED: n

logger:
  level: INFO
  baud_rate: 115200

wifi:
  ssid: "CC"
  password: "chen1122"
  power_save_mode: none

api:
  reboot_timeout: 0s

ota:
  - platform: esphome

sensor:
  - platform: uptime
    name: "Gateway Uptime"
  - platform: wifi_signal
    name: "WiFi Signal dBm"
    update_interval: 60s

button:
  - platform: restart
    name: "Restart Gateway"
