esphome:
  name: ct1
  friendly_name: CT1 Lite
  
  # 🚨 核心补丁：修复 eFuse MAC 损坏导致的底层崩溃
  on_boot:
    priority: 1000.0
    then:
      - lambda: |-
          #include "esp_mac_addr.h"
          #include "esp_system.h"
          uint8_t custom_mac[6] = {0xAA, 0xBB, 0xCC, 0xDD, 0xEE, 0xFF};
          esp_base_mac_addr_set(custom_mac);

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_FREERTOS_UNICORE: y          

logger:
  level: WARN                             
  baud_rate: 115200

wifi:
  ssid: "CC"
  password: "chen1122"
  power_save_mode: LIGHT                  

# 🚨 开启网页服务 (满足你的网页升级需求)
web_server:
  port: 80

api:
  reboot_timeout: 0s

ota:
  - platform: esphome                     

# === 蓝牙代理 ===
esp32_ble_tracker:
  scan_parameters:
    interval: 320ms
    window: 30ms
    active: false                         

bluetooth_proxy:                          

# === 基础监控 ===
sensor:
  - platform: uptime
    name: "Uptime"
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
