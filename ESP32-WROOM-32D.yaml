esphome:
  name: ct1
  friendly_name: CT1 Test

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_FREERTOS_UNICORE: y
      # 蓝牙代理必须使用 NimBLE 栈
      CONFIG_BT_NIMBLE_ENABLED: y 
      CONFIG_BT_CLASSIC_ENABLED: n

logger:
  baud_rate: 115200

wifi:
  ssid: "CC"
  password: "chen1122"
  power_save_mode: none

api:
  reboot_timeout: 0s

ota:
  - platform: esphome

# 开启蓝牙扫描（代理的前提）
esp32_ble_tracker:
  scan_parameters:
    interval: 320ms
    window: 30ms
    active: true

# 开启蓝牙代理（内存杀手）
bluetooth_proxy:
  active: true
