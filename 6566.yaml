      - delay: 100ms
      - lambda: 'id(ble_server).set_manufacturer_data({});'

  # 🔹 其他按钮 (Dev1 Fan Toggle/Reverse, Dev2 系列) 按相同模式优化延时...
  # 为节省篇幅，此处省略，您可按上述模板批量替换所有 button 的 delay: 300ms → 100ms

# ========== Dev3 状态实体 (只读) ==========
binary_sensor:
  - platform: template
    name: "Dev3 Light Power"
    id: dev3_power
    device_class: light
    icon: mdi:ceiling-light
  - platform: template
    name: "Dev3 Fan Running"
    id: dev3_fan_running
    device_class: running
    icon: mdi:fan

sensor:
  - platform: template
    name: "Dev3 Fan Speed"
    id: dev3_fan_speed
    unit_of_measurement: "档"
    accuracy_decimals: 0
    icon: mdi:numeric
  - platform: template
    name: "Dev3 Brightness"
    id: dev3_brightness
    unit_of_measurement: "%"
    accuracy_decimals: 0
    icon: mdi:brightness-percent 

# ========== WiFi 状态监控 🔹 新增 ==========
text_sensor:
  - platform: wifi_info
    ip_address:
      name: "ESP IP Address"
    ssid:
      name: "ESP Connected SSID"
    bssid:
      name: "ESP Connected BSSID"
    signal_strength:
      name: "ESP Signal Strength (dBm)"
      id: wifi_signal_db

sensor:
  - platform: copy
    source_id: wifi_signal_db
    name: "WiFi Signal Percent"
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "%"
    icon: mdi:wifi-strength-4

# ========== 增强版网络看门狗 ==========
interval:
  # 🔹 WiFi 监控 (60s)
  - interval: 60s
    then:
      - lambda: |-
          static uint32_t last_ok = 0;
          if (network::is_connected()) {
            last_ok = millis();
            // 🔹 信号弱时记录警告
            if (id(wifi_signal_db).has_state() && id(wifi_signal_db).state < -75) {
              ESP_LOGW("WiFi", "Signal weak: %.0f dBm", id(wifi_signal_db).state);
            }
          } else if (millis() - last_ok > 180000) {
            ESP_LOGW("Watchdog", "WiFi disconnected >3min, rebooting...");
            delay(100);
            App.reboot();
          }
  
  # 🔹 BLE 发送监控 (新增：防止卡死)
  - interval: 30s
    then:
      - lambda: |-
          // 如果超过 10 秒没有成功发送过指令，记录状态
          if (millis() - id(last_send_success) > 10000 && id(last_send_success) > 0) {
            ESP_LOGD("BLE", "Last send: %lu ms ago", millis() - id(last_send_success));
          }
