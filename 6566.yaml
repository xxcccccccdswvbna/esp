binary_sensor:
  - platform: template
    name: "Dev3 Light Power"
    id: dev3_power
    device_class: light
    icon: mdi:ceiling-light
  - platform: template
    name: "Dev3 Fan Running"
    id: dev3_fan_running
    device_class: running
    icon: mdi:fan

sensor:
  - platform: template
    name: "Dev3 Fan Speed"
    id: dev3_fan_speed
    unit_of_measurement: "档"
    accuracy_decimals: 0
    icon: mdi:numeric
  - platform: template
    name: "Dev3 Brightness"
    id: dev3_brightness
    unit_of_measurement: "%"
    accuracy_decimals: 0
    icon: mdi:brightness-percent
  - platform: wifi_signal
    name: "WiFi Signal Strength"
    id: wifi_signal_db
    update_interval: 60s
  - platform: copy
    source_id: wifi_signal_db
    name: "WiFi Signal Percent"
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "%"
    icon: mdi:wifi-strength-4

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "ESP IP Address"
    ssid:
      name: "ESP Connected SSID"
    bssid:
      name: "ESP Connected BSSID"

# ========== 🔒 网络看门狗（断网自动重启） ==========
interval:
  - interval: 30s
    then:
      - lambda: |-
          static uint32_t last_ok = 0;
          if (network::is_connected()) {
            last_ok = millis();  // 网络正常，刷新时间戳
          } else if (millis() - last_ok > 120000) {  // 断网超 2 分钟强制重启
            ESP_LOGW("Watchdog", "WiFi disconnected >2min, rebooting...");
            delay(100);
            App.reboot();
          }
