esphome:
  name: midea-dual-control
  friendly_name: Midea Dual Control
  # 🔹 添加项目版本，便于追踪配置变更
  project:
    name: "midea.dual-control"
    version: "1.1-optimized"

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf
    # 🔹 指定稳定版 SDK，避免自动升级导致兼容问题
    sdkconfig_options:
      CONFIG_ESP32_WIFI_SOFTAP_SUPPORT: "n"  # 禁用 SoftAP，专注 STA 模式节省资源

# ========== 日志与调试 ==========
logger:
  level: INFO
  logs:
    esp32_ble_server: WARN
    esp32_ble_tracker: WARN
    wifi: DEBUG  # 🔹 开启 WiFi 调试日志，便于排查连接问题

api:
  encryption:
    key: "4jGVSQw9/v+e8QCB/CSQIwGFcWS3Opo4oHSRbkq41RI="
  reboot_timeout: 1h
  # 🔹 添加连接保护，避免频繁重连
  services: []

ota:
  platform: esphome
  password: "chen1122"
  # 🔹 启用安全验证
  safe_mode: true

# ========== WiFi 增强配置 🔹 核心优化区 ==========
wifi:
  ssid: "CC"
  password: "chen1122"
  power_save_mode: none
  
  # 🔹 静态 IP：避免 DHCP 延迟/失败导致连接超时
  manual_ip:
    static_ip: 192.168.1.188          # ⚠️ 请替换为您的实际可用 IP
    gateway: 192.168.1.1
    subnet: 255.255.255.0
    dns1: 192.168.1.1
  
  # 🔹 快速连接：跳过扫描，直接使用上次成功参数
  fast_connect: true
  
  # 🔹 启用 802.11k/v 漫游支持（多 AP 环境必备）
  enable_btm: true
  enable_rrm: true
  
  # 🔹 缩短断线重连判定时间
  reboot_timeout: 5min
  
  # 🔹 可选：固定信道（需路由器配合，2.4G 信道 1/6/11）
  # networks:
  #   - ssid: "CC"
  #     password: "chen1122"
  #     channel: 6  # ⚠️ 需与路由器实际信道一致
  
  # 🔹 连接失败重试策略
  ap:
    ssid: "Midea-Control-Fallback"
    password: "fallback123"
    ap_timeout: 1min

# ========== BLE 共存优化 🔹 关键！减少射频冲突 ==========
esp32_ble:
  io_capability: none
  # 🔹 限制最大连接数，释放内存给 WiFi 栈
  max_connections: 2
  # 🔹 如果不需要被手机扫描，关闭广播
  advertising: false

esp32_ble_server:
  id: ble_server
  manufacturer_data: []
  # 🔹 添加连接状态回调，便于调试
  on_connect:
    - logger.log: "✅ BLE client connected"
  on_disconnect:
    - logger.log: "❌ BLE client disconnected"

# 🔹 BLE Tracker 优化：降低扫描频率，减少与 WiFi 的射频竞争
esp32_ble_tracker:
  scan_parameters:
    interval: 2000ms    # 原 1000ms → 降低 50% 扫描频率
    window: 200ms       # 原 500ms → 缩短 60% 扫描窗口
    active: false
  # 🔹 添加扫描超时保护
  scan_timeout: 30s
  # 🔹 Dev3 状态监听（保留原逻辑，仅优化触发条件）
  on_ble_manufacturer_data_advertise:
    - manufacturer_id: "134D"
      then:
        - lambda: |-
            if (x.size() < 20) return;
            if (x[0] != 0x21) return;
            // MAC 过滤: 00:00:70:27:80:48 → 广播反向: 48 80 27 70 00 00
            if (x[2]!=0x48 || x[3]!=0x80 || x[4]!=0x27 || x[5]!=0x70 || x[6]!=0x00 || x[7]!=0x00) return;
            
            // 解析字段
            bool power_on = (x[9] == 0x01);
            bool fan_running = (x[18] & 0x01);
            uint8_t fan_gear_idx = x[19];
            uint16_t brt_raw = (x[14] << 8) | x[15];
            
            // 发布到 HA（添加防抖，避免频繁更新）
            static bool last_power = false;
            static uint8_t last_gear = 0;
            static uint16_t last_brt = 0;
            
            if (power_on != last_power) {
              id(dev3_power).publish_state(power_on);
              last_power = power_on;
            }
            if (fan_running != (id(dev3_fan_running).state)) {
              id(dev3_fan_running).publish_state(fan_running);
            }
            if (fan_running && fan_gear_idx != last_gear) {
              id(dev3_fan_speed).publish_state(fan_gear_idx + 1);
              last_gear = fan_gear_idx;
            }
            if (brt_raw != last_brt) {
              id(dev3_brightness).publish_state(brt_raw == 0xFFFF ? 100 : (int)(brt_raw / 655.35));
              last_brt = brt_raw;
            }

# ========== 全局变量 (非阻塞架构核心) ==========
globals:
  - id: last_cmd_time
    type: uint32_t
    initial_value: '0'
  - id: cmd_pkt
    type: std::vector<uint8_t>
    initial_value: 'std::vector<uint8_t>{}'
  - id: end_pkt
    type: std::vector<uint8_t>
    initial_value: 'std::vector<uint8_t>{}'
  # 🔹 新增：记录最后一次成功发送时间，用于超时保护
  - id: last_send_success
    type: uint32_t
    initial_value: '0'

