esphome:
  name: midea-dual-control
  friendly_name: Midea Dual Control

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf
    # 🔹 降频至 80MHz：显著降低发热，性能仍足够 BLE+WiFi
    sdkconfig_options:
      CONFIG_ESP32C3_DEFAULT_CPU_FREQ_MHZ: "80"
      CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"

logger:
  level: WARN  # 🔹 降日志级别，减少 Flash I/O 与 CPU 占用
  logs:
    esp32_ble_server: WARN
    esp32_ble_tracker: WARN

api:
  encryption:
    key: "4jGVSQw9/v+e8QCB/CSQIwGFcWS3Opo4oHSRbkq41RI="
  reboot_timeout: 1h

ota:
  platform: esphome
  password: "chen1122"

wifi:
  ssid: "CC"
  password: "chen1122"
  power_save_mode: none
  manual_ip:
    static_ip: 192.168.6.72
    gateway: 192.168.6.1
    subnet: 255.255.255.0
    dns1: 192.168.6.1
  # 🔹 断网 10 分钟自动重启（与看门狗双重保险）
  reboot_timeout: 10min
  # 🔹 失败时开启备用热点，方便手机直连救砖
  ap:
    ssid: "Midea-Control-AP"
    password: "chen1122"
    ap_timeout: 1min

# 🔹 移除 bluetooth_proxy：ESP32-C3 内存仅 300KB，代理极易触发 OOM 重启
esp32_ble:
  io_capability: none

esp32_ble_server:
  id: ble_server
  manufacturer_data: []

esp32_ble_tracker:
  scan_parameters:
    interval: 2000ms
    window: 200ms
    active: false
  on_ble_manufacturer_data_advertise:
    - manufacturer_id: "134D"
      then:
        - lambda: |-
            if (x.size() < 20) return;
            if (x[0] != 0x21) return;
            if (x[2]!=0x48 || x[3]!=0x80 || x[4]!=0x27 || x[5]!=0x70 || x[6]!=0x00 || x[7]!=0x00) return;
            
            bool power_on = (x[9] == 0x01);
            bool fan_running = (x[18] & 0x01);
            uint8_t fan_gear_idx = x[19];
            uint16_t brt_raw = (x[14] << 8) | x[15];
            int brt_pct = (brt_raw == 0xFFFF) ? 100 : (int)(brt_raw / 655.35);
            
            id(dev3_power).publish_state(power_on);
            id(dev3_fan_running).publish_state(fan_running);
            id(dev3_fan_speed).publish_state(fan_running ? (fan_gear_idx + 1) : 0);
            id(dev3_brightness).publish_state(brt_pct);

globals:
  - id: last_cmd_time
    type: uint32_t
    initial_value: '0'
  - id: cmd_pkt
    type: std::vector<uint8_t>
    initial_value: 'std::vector<uint8_t>{}'
  - id: end_pkt_dev1
    type: std::vector<uint8_t>
    initial_value: '{0x11,0x4D,0x19,0x11,0x48,0x80,0x27,0x70,0x00,0x00,0x01,0x6E,0xB8,0x48,0x48,0xA7,0xF0,0x80,0x80,0x97,0x27,0x27,0x70,0x70,0x00,0x5D}'
  - id: end_pkt_dev2
    type: std::vector<uint8_t>
    initial_value: '{0x11,0x4D,0x19,0x11,0xF0,0xCF,0x2D,0x70,0x00,0x00,0x01,0x1C,0x60,0xF0,0xF0,0xFC,0x3F,0xCF,0xCF,0x9D,0x2D,0x2D,0x70,0x70,0x00,0x5E}'
  - id: current_dev_id
    type: int
    initial_value: '1'

# ========== 🔑 统一发送脚本（替代所有重复代码） ==========
script:
  - id: ble_send_unified
    then:
      - lambda: |-
          if (millis() - id(last_cmd_time) < 100) return; // 统一防抖 100ms
          id(last_cmd_time) = millis();
          
          // 按设备ID选择结束包
          if (id(current_dev_id) == 1) {
            id(ble_server).set_manufacturer_data(id(end_pkt_dev1));
          } else {
            id(ble_server).set_manufacturer_data(id(end_pkt_dev2));
          }
          // 发送控制包（无 delay，BLE 栈自动调度广播周期）
          id(ble_server).set_manufacturer_data(id(cmd_pkt));

