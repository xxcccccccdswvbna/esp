    optimistic: true
    unit_of_measurement: "%"
    icon: mdi:brightness-6
    set_action:
      - lambda: |-
          // 🔹 防抖 + 最小间隔保护
          if (millis() - id(last_cmd_time) < 200) return;  // 300ms → 200ms
          id(last_cmd_time) = millis();
          int val = (int)x;
          int snap = (val < 10) ? 0 : (val < 30) ? 20 : (val < 45) ? 40 : (val < 55) ? 50 : (val < 70) ? 60 : (val < 90) ? 80 : 100;
