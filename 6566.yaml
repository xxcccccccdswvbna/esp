esphome:
  name: midea-dual-control
  friendly_name: "cctu"

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

logger:
  level: INFO
  logs:
    esp32_ble_server: WARN

api:
  encryption:
    key: "4jGVSQw9/v+e8QCB/CSQIwGFcWS3Opo4oHSRbkq41RI="
  # 原本在这里的 reboot_timeout 针对的是 API 客户端断开，通常不需要长达 1 小时

ota:
  - platform: esphome
    password: "Chen1122"

wifi:
  ssid: "CC"
  password: "Chen1122"
  power_save_mode: NONE
  # 【优化】使用原生 Wi-Fi 看门狗，代替你自己写的 lambda 看门狗。3分钟连不上WiFi自动重启。
  reboot_timeout: 3min

esp32_ble:
  io_capability: NONE

esp32_ble_server:
  id: ble_server
  manufacturer_data: []

# ========== 全局变量 ==========
globals:
  - id: last_cmd_time
    type: uint32_t
    initial_value: "0"
  - id: cmd_pkt
    type: std::vector<uint8_t>
    initial_value: 'std::vector<uint8_t>()' #  显式指定为空的 vector 容器
  - id: end_pkt
    type: std::vector<uint8_t>
    initial_value: 'std::vector<uint8_t>()' #  显式指定为空的 vector 容器
# ========== 【新增】发射动作脚本 (解决动作队列溢出导致死机的核心) ==========
# 使用 mode: restart，确保快速拖动滑块时，只会执行最后一次广播，取消排队中的冗余广播，极大节省内存。
script:
  - id: execute_ble_cmd
    mode: restart
    then:
      - lambda: 'id(ble_server).set_manufacturer_data(id(cmd_pkt));'
      - delay: 300ms
      - lambda: 'id(ble_server).set_manufacturer_data(id(end_pkt));'
      - delay: 300ms
      - lambda: 'id(ble_server).set_manufacturer_data({});'

