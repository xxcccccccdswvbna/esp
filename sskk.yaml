esphome:
  name: c6-eth-gateway
  friendly_name: "C6 Ethernet Gateway"

esp32:
  board: esp32-c6-devkitc-1
  variant: ESP32C6
  framework:
    type: esp-idf

# ✅ 尝试 W5500 配置
ethernet:
  type: W5500
  clk_pin: GPIO10    # ESP32-C6 默认 SPI 时钟
  mosi_pin: GPIO11   # 默认 MOSI
  miso_pin: GPIO12   # 默认 MISO
  cs_pin: GPIO13     # 默认 片选
  # interrupt_pin: GPIO4  # 如果编译报错缺中断，取消注释并尝试 GPIO4/5/6
  # reset_pin: GPIO5      # 如果连不上，取消注释并尝试 GPIO5/15

