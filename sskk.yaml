esphome:
  name: c6-eth-gateway
  friendly_name: "C6 Ethernet Gateway"

esp32:
  board: esp32-c6-devkitc-1
  variant: ESP32C6
  framework:
    type: esp-idf

# ✅ 核心配置：以太网 (Ethernet) - 已修正 type 值
ethernet:
  type: IP101           # ← 修正这里：去掉 "GR" 后缀
  mdc_pin: GPIO20
  mdio_pin: GPIO21
  clk_mode: GPIO0_IN
  phy_addr: 0

# API 配置 (接入 Home Assistant)
api:
  encryption:
    key: "4jGVSQw9/v+e8QCB/CSQIwGFcWS3Opo4oHSRbkq41RI="
  reboot_timeout: 1h

# OTA 配置
ota:
  - platform: esphome
    password: "chen1122"
  - platform: web_server

# Web 控制台
web_server:
  port: 80
  version: 2

logger:
  level: INFO

# 功能组件
binary_sensor:
  - platform: status
    name: "Ethernet Status"

sensor:
  - platform: uptime
    name: "System Uptime"
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

button:
  - platform: restart
    name: "Reboot Device"

text_sensor:
  - platform: ethernet_info
    ip_address:
      name: "Ethernet IP"
