esphome:
  name: c6-ble-gateway
  friendly_name: "C6 BLE Gateway"
  min_version: 2024.6.0

esp32:
  board: esp32-c6-devkitc-1
  variant: ESP32C6
  framework:
    type: arduino  # ← 关键：改用 Arduino 框架
    # 移除所有 sdkconfig_options（Arduino 不需要）

logger:
  level: WARN
  logs:
    esp32_ble: WARN
    esp32_ble_tracker: WARN
    wifi: WARN
    api: WARN

api:
  encryption:
    key: "4jGVSQw9/v+e8QCB/CSQIwGFcWS3Opo4oHSRbkq41RI="
  reboot_timeout: 1h

ota:
  - platform: esphome
    password: "chen1122"
  - platform: web_server

web_server:
  port: 80
  version: 2

wifi:
  ssid: "CC"
  password: "chen1122"
  power_save_mode: none
  fast_connect: true
  manual_ip:
    static_ip: 192.168.6.84  # 🔹 新 IP，避免冲突
    gateway: 192.168.6.1
    subnet: 255.255.255.0
    dns1: 192.168.6.1
  reboot_timeout: 5min
  ap:
    ssid: "C6-Gateway-AP"
    password: "chen1122"

captive_portal:

# 🔹 仅启用基础 BLE（无 bluetooth_proxy）
esp32_ble:
  io_capability: none
  enable_on_boot: true

# ❌ 已移除 bluetooth_proxy（C6 不兼容）

# 🔹 BLE Server（美的控制专用）
esp32_ble_server:
  id: ble_server
  manufacturer_data: []

# 🔹 BLE Tracker（接收美的广播）
esp32_ble_tracker:
  scan_parameters:
    interval: 1000ms
    window: 50ms
    active: false
  on_ble_manufacturer_data_advertise:
    - manufacturer_id: "134D"
      then:
        - lambda: |-
            if (x.size() < 20) return;
            if (x[0] != 0x21) return;
            if (x[2]!=0x48 || x[3]!=0x80 || x[4]!=0x27 || x[5]!=0x70 || x[6]!=0x00 || x[7]!=0x00) return;
            
            bool power_on = (x[9] == 0x01);
            bool fan_running = (x[18] & 0x01);
            uint8_t fan_gear_idx = x[19];
            uint16_t brt_raw = (x[14] << 8) | x[15];
            int brt_pct = (brt_raw == 0xFFFF) ? 100 : (int)(brt_raw / 655.35);
            
            id(dev3_power).publish_state(power_on);
            id(dev3_fan_running).publish_state(fan_running);
            id(dev3_fan_speed).publish_state(fan_running ? (fan_gear_idx + 1) : 0);
            id(dev3_brightness).publish_state(brt_pct);

globals:
  - id: pkt_1
    type: std::vector<uint8_t>
    initial_value: 'std::vector<uint8_t>{}'
  - id: pkt_2
    type: std::vector<uint8_t>
    initial_value: 'std::vector<uint8_t>{}'
  - id: last_cmd_time
    type: uint32_t
    initial_value: '0'

script:
  - id: ble_send
    mode: restart
    then:
      - lambda: 'id(ble_server).set_manufacturer_data(id(pkt_1));'
      - delay: 150ms
      - lambda: 'id(ble_server).set_manufacturer_data(id(pkt_2));'
      - delay: 50ms
      - lambda: 'id(ble_server).set_manufacturer_data({});'

# 🔹 Select 控件（保留你的完整逻辑）
select:
  # 🟦 Dev1 亮度
  - platform: template
    name: "Dev1 Light Brightness"
    id: dev1_brt
    options: ["0%", "20%", "40%", "50%", "60%", "80%", "100%"]
    optimistic: true
    set_action:
      - lambda: |-
          if (millis() - id(last_cmd_time) < 200) return; id(last_cmd_time) = millis();
          if (x == "0%") { id(pkt_1)={0x11,0x4D,0x19,0x15,0x48,0x80,0x27,0x70,0x00,0x00,0x01,0xA6,0xF1,0xD1,0x82,0x97,0x27,0x27,0x70,0x70,0x00,0x5F,0xC8,0x6F,0xB8,0x1E}; id(pkt_2)={0x11,0x4D,0x19,0x14,0x48,0x80,0x27,0x70,0x00,0x00,0x01,0x49,0xA7,0xF0,0x80,0x80,0x97,0x27,0x27,0x70,0x70,0x00,0x5F,0xC8,0x6F,0xBA}; }
          # ... 其他亮度选项保持不变 ...
          # （为节省篇幅，此处省略重复代码，请保留你原配置中的所有 select 项）
      - script.execute: ble_send

  # 🟦 Dev1 色温、风扇 + 🟧 Dev2 亮度、色温、风扇
  # → 请完整复制你原配置中的所有 select 和 button 项，逻辑完全兼容

# 🔹 按钮控件（同样保留）
button:
  - platform: template
    name: "Dev1 Light Toggle"
    icon: mdi:lightbulb
    on_press:
      - lambda: |-
          if (millis() - id(last_cmd_time) < 200) return; id(last_cmd_time) = millis();
          id(pkt_1)={0x11,0x4D,0x19,0x15,0x48,0x80,0x27,0x70,0x00,0x00,0x01,0xA6,0xF0,0x86,0x80,0x97,0x27,0x27,0x70,0x70,0x00,0x5F,0xC8,0x6F,0xB8,0x40};
          id(pkt_2)={0x11,0x4D,0x19,0x1C,0x48,0x80,0x27,0x70,0x00,0x00,0x01,0x71,0x70,0x00,0x5F,0xC8,0x6F,0xB8,0x48,0x48,0xA7,0xF0,0x80,0x80,0x97,0x25};
      - script.execute: ble_send
  # ... 其他 button 项同样保留 ...

# 🔹 状态传感器
binary_sensor:
  - platform: template
    name: "Dev3 Light Power"
    id: dev3_power
    device_class: light
  - platform: template
    name: "Dev3 Fan Running"
    id: dev3_fan_running
    device_class: running

sensor:
  - platform: template
    name: "Dev3 Fan Speed"
    id: dev3_fan_speed
    unit_of_measurement: "档"
  - platform: template
    name: "Dev3 Brightness"
    id: dev3_brightness
    unit_of_measurement: "%"
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "ESP IP"

interval:
  - interval: 30s
    then:
      - lambda: |-
          static uint32_t last_ok = 0;
          if (network::is_connected()) {
            last_ok = millis();
          } else if (millis() - last_ok > 120000) {
            ESP_LOGW("Watchdog", "WiFi disconnected >2min, rebooting...");
            App.reboot();
          }
