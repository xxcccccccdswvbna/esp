# ========== 全局防抖计时器 ==========
globals:
  - id: last_ble_cmd_time
    type: uint32_t
    initial_value: '0'

# ========== 滑块控制 (强制离散吸附 + 500ms 防抖/间隔) ==========
number:
  # 🌟 亮度滑块 (0-100% → 吸附到 7 档)
