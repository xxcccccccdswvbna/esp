esphome:
  name: yeelight-gateway-v3
  friendly_name: Yeelight Gateway V3

esp32:
  board: esp32dev
  flash_size: 4MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_FREERTOS_UNICORE: y

logger:

api:

ota:
  - platform: esphome

wifi:
  ssid: "CC"
  password: "chen1122"

captive_portal:

web_server:

esp32_ble_tracker:

bluetooth_proxy:
  active: true

sensor:
  - platform: uptime
    name: Uptime

  - platform: wifi_signal
    name: WiFi RSSI

text_sensor:
  - platform: wifi_info
    ip_address:
      name: IP

output:
  - platform: gpio
    id: blue_led_out
    pin:
      number: GPIO27
      inverted: true
  - platform: gpio
    id: white_led_out
    pin:
      number: GPIO26
      inverted: true

light:
  - platform: binary
    name: Blue LED
    id: blue_led
    output: blue_led_out

  - platform: binary
    name: White LED
    id: white_led
    output: white_led_out

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO34
    name: KEY1
    on_press:
      - light.toggle: blue_led

  - platform: gpio
    pin:
      number: GPIO35
    name: KEY2
    on_press:
      - light.toggle: white_led

  - platform: gpio
    pin:
      number: GPIO32
    name: KEY3
    on_press:
      - light.turn_on: blue_led
      - light.turn_on: white_led

  - platform: gpio
    pin:
      number: GPIO33
    name: KEY4
    on_press:
      - light.turn_off: blue_led
      - light.turn_off: white_led

button:
  - platform: restart
    name: Restart Device
