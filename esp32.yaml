substitutions:
  test_gpio: "2"

esphome:
  name: yeelight-led-test
  friendly_name: Yeelight LED Test

esp32:
  board: esp32dev
  flash_size: 4MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_FREERTOS_UNICORE: y

logger:
  level: VERY_VERBOSE

api:

ota:
  - platform: esphome

wifi:
  ssid: "CC"
  password: "chen1122"

web_server:

captive_portal:

sensor:
  - platform: uptime
    name: Uptime

text_sensor:
  - platform: wifi_info
    ip_address:
      name: IP

# 已确认的四个按键
binary_sensor:
  - platform: gpio
    pin: GPIO34
    name: KEY1
    on_press:
      - logger.log: "KEY1"

  - platform: gpio
    pin: GPIO35
    name: KEY2
    on_press:
      - logger.log: "KEY2"

  - platform: gpio
    pin: GPIO32
    name: KEY3
    on_press:
      - logger.log: "KEY3"

  - platform: gpio
    pin: GPIO33
    name: KEY4
    on_press:
      - logger.log: "KEY4"

# ================= 所有的 output 定义 =================
output:
  - platform: gpio
    id: test_output
    pin:
      number: GPIO${test_gpio}
  - platform: gpio
    id: gpio2
    pin: GPIO2
  - platform: gpio
    id: gpio4
    pin: GPIO4
  - platform: gpio
    id: gpio5
    pin: GPIO5
  - platform: gpio
    id: gpio12
    pin: GPIO12
  - platform: gpio
    id: gpio13
    pin: GPIO13
  - platform: gpio
    id: gpio14
    pin: GPIO14
  - platform: gpio
    id: gpio15
    pin: GPIO15
  - platform: gpio
    id: gpio16
    pin: GPIO16
  - platform: gpio
    id: gpio17
    pin: GPIO17
  - platform: gpio
    id: gpio18
    pin: GPIO18
  - platform: gpio
    id: gpio19
    pin: GPIO19
  - platform: gpio
    id: gpio21
    pin: GPIO21
  - platform: gpio
    id: gpio22
    pin: GPIO22
  - platform: gpio
    id: gpio23
    pin: GPIO23
  - platform: gpio
    id: gpio25
    pin: GPIO25
  - platform: gpio
    id: gpio26
    pin: GPIO26
  - platform: gpio
    id: gpio27
    pin: GPIO27

switch:
  - platform: output
    name: GPIO ${test_gpio}
    output: test_output

# ================= 所有的 button 定义 (已添加唯一 id) =================
button:
  - platform: template
    name: 测试GPIO
    id: btn_test_gpio  # <--- 新增唯一 ID
    on_press:
      - logger.log: "========== START TEST =========="
      - output.turn_on: test_output
      - delay: 1s
      - output.turn_off: test_output
      - delay: 300ms
      - output.turn_on: test_output
      - delay: 300ms
      - output.turn_off: test_output
      - delay: 300ms
      - output.turn_on: test_output
      - delay: 300ms
      - output.turn_off: test_output
      - logger.log: "========== END TEST =========="

  - platform: template
    name: "测试 第一组"
    id: btn_group_1    # <--- 新增唯一 ID
    on_press:
      - output.turn_on: gpio2
      - delay: 800ms
      - output.turn_off: gpio2
      - output.turn_on: gpio4
      - delay: 800ms
      - output.turn_off: gpio4
      - output.turn_on: gpio5
      - delay: 800ms
      - output.turn_off: gpio5
      - output.turn_on: gpio12
      - delay: 800ms
      - output.turn_off: gpio12

  - platform: template
    name: "测试 第二组"
    id: btn_group_2    # <--- 新增唯一 ID
    on_press:
      - output.turn_on: gpio13
      - delay: 800ms
      - output.turn_off: gpio13
      - output.turn_on: gpio14
      - delay: 800ms
      - output.turn_off: gpio14
      - output.turn_on: gpio15
      - delay: 800ms
      - output.turn_off: gpio15
      - output.turn_on: gpio16
      - delay: 800ms
      - output.turn_off: gpio16

  - platform: template
    name: "测试 第三组"
    id: btn_group_3    # <--- 新增唯一 ID
    on_press:
      - output.turn_on: gpio17
      - delay: 800ms
      - output.turn_off: gpio17
      - output.turn_on: gpio18
      - delay: 800ms
      - output.turn_off: gpio18
      - output.turn_on: gpio19
      - delay: 800ms
      - output.turn_off: gpio19
      - output.turn_on: gpio21
      - delay: 800ms
      - output.turn_off: gpio21

  - platform: template
    name: "测试 第四组"
