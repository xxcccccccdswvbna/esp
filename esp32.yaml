      - output.turn_on: gpio23
      - delay: 800ms
      - output.turn_off: gpio23
      - output.turn_on: gpio25
      - delay: 800ms
      - output.turn_off: gpio25
      - output.turn_on: gpio26
      - delay: 800ms
      - output.turn_off: gpio26

