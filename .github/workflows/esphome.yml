name: Build & Release ESPHome

on:
  workflow_dispatch:
  push:
    paths:
      - "**/*.yaml"

permissions:
  contents: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      files: ${{ steps.changed.outputs.files }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 检测修改 YAML
        id: changed
        run: |
          FILES=$(git diff --name-only HEAD^ HEAD \
            | grep '\.yaml$' \
            | jq -R -s -c 'split("\n")[:-1]')

          if [ -z "$FILES" ]; then
            FILES="[]"
          fi

          echo "files=$FILES" >> $GITHUB_OUTPUT

  build:
    needs: detect
    if: needs.detect.outputs.files != '[]'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        yaml: ${{ fromJson(needs.detect.outputs.files) }}

    steps:
      - uses: actions/checkout@v4

      - name: 编译 ESPHome
        uses: esphome/build-action@v6
        with:
          yaml-file: ${{ matrix.yaml }}

      - name: 收集固件
        run: |
          mkdir -p output
          find .esphome/build -name "*.bin" -exec cp {} output/ \;

      # 🚨 【新增救命步骤】：无论后续是否报错，先把固件打包存档，供你手动下载！
      - name: 上传固件到 Artifacts (重要)
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.yaml }} # 以 yaml 文件名命名，方便区分
          path: output/*.bin
          retention-days: 7 # 保留 7 天

      - name: 生成版本号
        id: tag
        run: |
          TAG=$(date +'%Y%m%d-%H%M%S')
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        # 即使这一步因为 GitHub 服务器抽风而失败，也不会影响你从 Artifacts 下载固件
        continue-on-error: true 
        with:
          tag_name: build-${{ steps.tag.outputs.tag }}
          name: ESPHome-${{ steps.tag.outputs.tag }}
          body: |
            自动编译生成

            YAML:
            ${{ matrix.yaml }}
          files: output/*.bin
          overwrite_files: true
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
