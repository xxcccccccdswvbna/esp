name: Build Changed ESPHome

on:
  workflow_dispatch:
  push:
    paths:
      - "**/*.yaml"

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      files: ${{ steps.changed.outputs.files }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 检测变更 YAML
        id: changed
        run: |
          FILES=$(git diff --name-only HEAD^ HEAD \
            | grep '\.yaml$' \
            | jq -R -s -c 'split("\n")[:-1]')

          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "$FILES"

  build:
    needs: detect
    if: needs.detect.outputs.files != '[]'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        yaml: ${{ fromJson(needs.detect.outputs.files) }}

    steps:
      - uses: actions/checkout@v4

      - name: Build
        uses: esphome/build-action@v6
        with:
          yaml-file: ${{ matrix.yaml }}

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.yaml }}-firmware
          path: .esphome/build/
          retention-days: 30
