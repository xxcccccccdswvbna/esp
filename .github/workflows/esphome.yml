name: Build ESPHome

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: esphome/build-action@v6
        with:
          yaml-file: midea-send-only.yaml

      - uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: .esphome/build/**/firmware.bin
