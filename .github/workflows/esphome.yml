name: Build ESPHome

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        yaml:
          - S3-529.yaml
          - midea-send-only.yaml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ESPHome
        uses: esphome/build-action@v6
        with:
          yaml-file: ${{ matrix.yaml }}

      - name: 收集固件
        run: |
          mkdir -p output
          find . -type f -name "*.bin" -exec cp -f {} output/ \;

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: esphome-${{ matrix.yaml }}
          path: output/
